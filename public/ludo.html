<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Watch-Night | Ludo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary:#00f3ff; --secondary:#bc13fe; --bg:#050505; --red:#ff4757; --green:#2ed573; --yellow:#ffa502; --blue:#1e90ff; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:#fff;overflow-x:hidden;min-height:100dvh}

    .glass{background:rgba(10,10,10,.75);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08)}
    .neon-btn{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#000;font-weight:700;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;transition:all .25s;cursor:pointer;border:none}
    .neon-btn:hover{filter:brightness(1.15);box-shadow:0 0 24px rgba(0,243,255,.35)}
    .neon-btn:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(1);box-shadow:none}

    /* ── Board ── */
    #ludo-board{display:grid;grid-template-columns:repeat(15,1fr);grid-template-rows:repeat(15,1fr);width:min(92vw,560px);height:min(92vw,560px);border:3px solid rgba(255,255,255,.25);border-radius:8px;overflow:hidden;box-shadow:0 0 40px rgba(0,243,255,.1),inset 0 0 60px rgba(0,0,0,.5);position:relative;background:#111}
    .cell{position:relative;display:flex;align-items:center;justify-content:center;border:.5px solid rgba(0,0,0,.3);transition:background .2s}

    /* Home zones */
    .zone-red{background:linear-gradient(135deg,rgba(255,71,87,.25),rgba(255,71,87,.12))}
    .zone-green{background:linear-gradient(135deg,rgba(46,213,115,.25),rgba(46,213,115,.12))}
    .zone-yellow{background:linear-gradient(135deg,rgba(255,165,2,.25),rgba(255,165,2,.12))}
    .zone-blue{background:linear-gradient(135deg,rgba(30,144,255,.25),rgba(30,144,255,.12))}
    .home-inner{background:rgba(255,255,255,.05)!important;border:1px solid rgba(255,255,255,.04)!important}
    .home-spot{width:70%;height:70%;border-radius:50%;background:rgba(255,255,255,.04);border:1.5px dashed rgba(255,255,255,.1)}

    /* Path */
    .path-cell{background:rgba(235,235,235,.9)}

    /* Start cells */
    .start-red{background:rgba(255,71,87,.65)!important}
    .start-green{background:rgba(46,213,115,.65)!important}
    .start-yellow{background:rgba(255,165,2,.65)!important}
    .start-blue{background:rgba(30,144,255,.65)!important}
    .start-red::after,.start-green::after,.start-yellow::after,.start-blue::after{content:'▶';font-size:.55rem;opacity:.4;position:absolute;color:#fff}
    .start-red::after{}
    .start-green::after{transform:rotate(90deg)}
    .start-yellow::after{transform:rotate(180deg)}
    .start-blue::after{transform:rotate(270deg)}

    /* Safe stars */
    .safe-cell{background:rgba(210,210,210,.6)!important}
    .safe-cell::after{content:'★';position:absolute;font-size:.75rem;color:rgba(0,0,0,.15);pointer-events:none}

    /* Home stretches */
    .hs-red{background:rgba(255,71,87,.35)!important}
    .hs-green{background:rgba(46,213,115,.35)!important}
    .hs-yellow{background:rgba(255,165,2,.35)!important}
    .hs-blue{background:rgba(30,144,255,.35)!important}

    /* Center */
    .center-cell{background:conic-gradient(from 45deg,var(--red),var(--green),var(--yellow),var(--blue),var(--red));opacity:.6}

    /* ── Tokens ── */
    .token{width:72%;height:72%;border-radius:50%;border:2.5px solid rgba(255,255,255,.9);position:absolute;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.45);transition:transform .1s,box-shadow .1s;cursor:default}
    .token-red{background:radial-gradient(circle at 35% 35%,#ff6b7a,var(--red))}
    .token-green{background:radial-gradient(circle at 35% 35%,#5ae89c,var(--green))}
    .token-yellow{background:radial-gradient(circle at 35% 35%,#ffba33,var(--yellow))}
    .token-blue{background:radial-gradient(circle at 35% 35%,#4da8ff,var(--blue))}
    .token.highlight{animation:tpulse .8s ease-in-out infinite;cursor:pointer;z-index:20;box-shadow:0 0 12px var(--primary),0 0 24px rgba(0,243,255,.3);border-color:var(--primary)}
    @keyframes tpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
    /* Stacking in home */
    .token.stack-0{top:12%;left:12%}
    .token.stack-1{top:12%;right:12%;left:auto}
    .token.stack-2{bottom:12%;left:12%;top:auto}
    .token.stack-3{bottom:12%;right:12%;top:auto;left:auto}

    /* ── Dice ── */
    .dice-box{width:64px;height:64px;background:#fff;border-radius:12px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);padding:8px;gap:2px;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 12px rgba(0,0,0,.3)}
    .dice-box:hover:not(.disabled){transform:scale(1.05);box-shadow:0 4px 20px rgba(0,243,255,.3)}
    .dice-box.disabled{opacity:.35;cursor:not-allowed}
    .dice-box.rolling{animation:droll .6s ease-out}
    @keyframes droll{0%{transform:rotateX(0) rotateZ(0) scale(1)}25%{transform:rotateX(180deg) rotateZ(90deg) scale(.9)}50%{transform:rotateX(360deg) rotateZ(180deg) scale(1.1)}75%{transform:rotateX(540deg) rotateZ(270deg) scale(.95)}100%{transform:rotateX(720deg) rotateZ(360deg) scale(1)}}
    .dot{width:100%;height:100%;border-radius:50%;background:transparent;transition:background .1s}
    .dot.on{background:#1a1a1a}

    /* ── Overlays ── */
    #waitingScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50}
    #winner-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;animation:fadeUp .5s}
    @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    #backBtn{position:fixed;top:16px;left:16px;z-index:100;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.15);padding:6px 14px;border-radius:8px;display:flex;align-items:center;gap:6px;text-decoration:none;color:#ccc;font-size:13px;font-family:'Rajdhani',sans-serif;transition:all .25s}
    #backBtn:hover{background:var(--primary);color:#000;border-color:var(--primary)}
    .player-row{transition:all .3s}
    .player-row.active-turn{box-shadow:inset 0 0 0 2px rgba(255,255,255,.6)}

    /* Toast */
    @keyframes slideIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 99999; display: flex; flex-direction: column; gap: 8px; }
    .toast-item { padding: 10px 18px; border-radius: 10px; font-size: 0.875rem; font-weight: 500; backdrop-filter: blur(10px); animation: slideIn 0.4s ease; border-left: 3px solid; }
    .toast-success { background: rgba(0,0,0,0.8); color: #4ade80; border-color: #4ade80; }
    .toast-info { background: rgba(0,0,0,0.8); color: #22d3ee; border-color: #22d3ee; }
    .toast-error { background: rgba(0,0,0,0.8); color: #f87171; border-color: #f87171; }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

  <div class="toast-container" id="toastContainer"></div>

  <a href="/?skipSplash=1" id="backBtn">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    Lobby
  </a>

  <div id="waitingScreen">
    <div class="text-6xl mb-6 animate-bounce">&#127922;</div>
    <h2 class="text-3xl font-bold mb-2" style="font-family:'Orbitron'">Waiting for Players</h2>
    <p class="text-gray-500 text-lg">Need at least 2 to start</p>
    <div class="flex gap-5 mt-8">
      <div class="w-5 h-5 rounded-full bg-red-500 animate-pulse"></div>
      <div class="w-5 h-5 rounded-full bg-green-500 animate-pulse" style="animation-delay:.15s"></div>
      <div class="w-5 h-5 rounded-full bg-yellow-500 animate-pulse" style="animation-delay:.3s"></div>
      <div class="w-5 h-5 rounded-full bg-blue-500 animate-pulse" style="animation-delay:.45s"></div>
    </div>
    <p id="playerCountText" class="text-sm text-gray-600 mt-5">Players: 1</p>
  </div>

  <div id="winner-overlay">
    <div class="text-7xl mb-4">&#127942;</div>
    <h1 class="text-5xl font-bold mb-3" style="font-family:'Orbitron'">WINNER</h1>
    <p id="winner-name" class="text-3xl font-bold" style="color:var(--primary)">Player</p>
    <button onclick="resetGame()" class="neon-btn mt-8 px-8 py-3 rounded-xl text-lg">Play Again</button>
  </div>

  <div class="flex flex-col md:flex-row items-center justify-center gap-6 p-4 hidden" id="gameContainer">
    <div class="glass rounded-2xl p-5 flex flex-col items-center gap-3 w-full md:w-52 order-2 md:order-1">
      <h3 style="font-family:'Orbitron'" class="text-lg tracking-wide">TURN <span id="turnIndicator" class="text-[var(--primary)]">—</span></h3>
      <div id="dice" class="dice-box disabled" onclick="rollDice()">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <p id="diceResult" class="text-xs text-gray-500 h-5 text-center"></p>
      <div class="w-full space-y-2 mt-3">
        <div id="p-red" class="player-row flex justify-between items-center px-3 py-2 rounded-lg bg-red-500/10 border border-red-500/30 opacity-30">
          <span class="text-sm font-bold">Red</span><span class="text-xs text-gray-400">0/4</span>
        </div>
        <div id="p-green" class="player-row flex justify-between items-center px-3 py-2 rounded-lg bg-green-500/10 border border-green-500/30 opacity-30">
          <span class="text-sm font-bold">Green</span><span class="text-xs text-gray-400">0/4</span>
        </div>
        <div id="p-yellow" class="player-row flex justify-between items-center px-3 py-2 rounded-lg bg-yellow-500/10 border border-yellow-500/30 opacity-30">
          <span class="text-sm font-bold">Yellow</span><span class="text-xs text-gray-400">0/4</span>
        </div>
        <div id="p-blue" class="player-row flex justify-between items-center px-3 py-2 rounded-lg bg-blue-500/10 border border-blue-500/30 opacity-30">
          <span class="text-sm font-bold">Blue</span><span class="text-xs text-gray-400">0/4</span>
        </div>
      </div>
    </div>
    <div id="ludo-board" class="order-1 md:order-2"></div>
  </div>

  <script src="/voice-manager.js"></script>
  <script>
    const socket = io();
    const partyCode = localStorage.getItem('partyCode');
    const myName    = localStorage.getItem('watchNightName');
    const myUid     = localStorage.getItem('watchNightUid');
    if (!partyCode) window.location.href = '/';

    /* ── Toast System ── */
    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast-item toast-${type}`;
      toast.innerHTML = `<div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full ${type==='success'?'bg-green-400':type==='error'?'bg-red-400':'bg-cyan-400'}"></span>${message}</div>`;
      container.appendChild(toast);
      setTimeout(() => { toast.style.transition = 'all 0.4s ease'; toast.style.opacity = '0'; toast.style.transform = 'translateX(100px)'; setTimeout(() => toast.remove(), 400); }, 3000);
    }

    /* ── Complete 52-cell outer path (clockwise from Red's entry) ── */
    const PATH = [
      [6,1],[6,2],[6,3],[6,4],[6,5],
      [5,6],[4,6],[3,6],[2,6],[1,6],[0,6],
      [0,7],[0,8],
      [1,8],[2,8],[3,8],[4,8],[5,8],
      [6,9],[6,10],[6,11],[6,12],[6,13
