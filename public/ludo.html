<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Watch-Night | Ludo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary:#00f3ff; --secondary:#bc13fe; --bg:#050505; --red:#ff4757; --green:#2ed573; --yellow:#ffa502; --blue:#1e90ff; }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:#fff;overflow-x:hidden;min-height:100dvh}

    .glass{background:rgba(10,10,10,.75);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.08)}
    .neon-btn{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#000;font-weight:700;font-family:'Rajdhani',sans-serif;letter-spacing:.5px;transition:all .25s;cursor:pointer;border:none}
    .neon-btn:hover{filter:brightness(1.15);box-shadow:0 0 24px rgba(0,243,255,.35)}
    .neon-btn:disabled{opacity:.4;cursor:not-allowed;filter:grayscale(1);box-shadow:none}

    #ludo-board{display:grid;grid-template-columns:repeat(15,1fr);grid-template-rows:repeat(15,1fr);width:min(92vw,560px);height:min(92vw,560px);border:3px solid rgba(255,255,255,.25);border-radius:8px;overflow:hidden;box-shadow:0 0 40px rgba(0,243,255,.1),inset 0 0 60px rgba(0,0,0,.5);position:relative;background:#111}
    
    .cell{position:relative;display:flex;align-items:center;justify-content:center;border:.5px solid rgba(0,0,0,.3);transition:background .2s}
    
    /* Zones */
    .zone-red{background:linear-gradient(135deg,rgba(255,71,87,.25),rgba(255,71,87,.12))}
    .zone-green{background:linear-gradient(135deg,rgba(46,213,115,.25),rgba(46,213,115,.12))}
    .zone-yellow{background:linear-gradient(135deg,rgba(255,165,2,.25),rgba(255,165,2,.12))}
    .zone-blue{background:linear-gradient(135deg,rgba(30,144,255,.25),rgba(30,144,255,.12))}
    
    .path-cell{background:rgba(235,235,235,.9)}
    
    /* Start Cells colored */
    .start-red{background:rgba(255,71,87,.65)!important}
    .start-green{background:rgba(46,213,115,.65)!important}
    .start-yellow{background:rgba(255,165,2,.65)!important}
    .start-blue{background:rgba(30,144,255,.65)!important}

    /* Home stretches */
    .hs-red{background:rgba(255,71,87,.35)!important}
    .hs-green{background:rgba(46,213,115,.35)!important}
    .hs-yellow{background:rgba(255,165,2,.35)!important}
    .hs-blue{background:rgba(30,144,255,.35)!important}

    /* Center */
    .center-cell{background:conic-gradient(from 45deg,var(--red),var(--green),var(--yellow),var(--blue),var(--red));opacity:.6}

    /* Tokens */
    .token{width:70%;height:70%;border-radius:50%;border:2.5px solid rgba(255,255,255,.9);position:absolute;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.45);transition:all .3s cubic-bezier(0.175, 0.885, 0.32, 1.275);cursor:default}
    
    .token-red{background:radial-gradient(circle at 35% 35%,#ff6b7a,var(--red))}
    .token-green{background:radial-gradient(circle at 35% 35%,#5ae89c,var(--green))}
    .token-yellow{background:radial-gradient(circle at 35% 35%,#ffba33,var(--yellow))}
    .token-blue{background:radial-gradient(circle at 35% 35%,#4da8ff,var(--blue))}
    
    .token.highlight{animation:tpulse .8s ease-in-out infinite;cursor:pointer;z-index:20;box-shadow:0 0 12px var(--primary),0 0 24px rgba(0,243,255,.3);border-color:var(--primary)}
    @keyframes tpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}

    /* Dice */
    .dice-box{width:64px;height:64px;background:#fff;border-radius:12px;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);padding:8px;gap:2px;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 12px rgba(0,0,0,.3)}
    .dice-box:hover:not(.disabled){transform:scale(1.05)}
    .dice-box.disabled{opacity:.35;cursor:not-allowed}
    .dice-box.rolling{animation:droll .6s ease-out}
    @keyframes droll{0%{transform:rotateX(0) rotateZ(0) scale(1)}50%{transform:rotateX(360deg) rotateZ(180deg) scale(1.1)}100%{transform:rotateX(720deg) rotateZ(360deg) scale(1)}}
    .dot{width:100%;height:100%;border-radius:50%;background:transparent;transition:background .1s}
    .dot.on{background:#1a1a1a}

    /* Overlays */
    #waitingScreen{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50}
    #winner-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100}
    #backBtn{position:fixed;top:16px;left:16px;z-index:100;background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.15);padding:6px 14px;border-radius:8px;display:flex;align-items:center;gap:6px;text-decoration:none;color:#ccc;font-size:13px;transition:all .25s}
    #backBtn:hover{background:var(--primary);color:#000;border-color:var(--primary)}
    .player-row.active-turn{box-shadow:inset 0 0 0 2px var(--primary); background: rgba(255,255,255,0.1)}
    
    /* Toast */
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 99999; display: flex; flex-direction: column; gap: 8px; }
    .toast-item { padding: 10px 18px; border-radius: 10px; font-size: 0.875rem; font-weight: 500; backdrop-filter: blur(10px); border-left: 3px solid; animation: slideIn 0.4s ease; }
    .toast-success { background: rgba(0,0,0,0.8); color: #4ade80; border-color: #4ade80; }
    .toast-error { background: rgba(0,0,0,0.8); color: #f87171; border-color: #f87171; }
    .toast-info { background: rgba(0,0,0,0.8); color: #22d3ee; border-color: #22d3ee; }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

  <div class="toast-container" id="toastContainer"></div>

  <a href="/?skipSplash=1" id="backBtn">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    Lobby
  </a>

  <div id="waitingScreen">
    <div class="text-6xl mb-6 animate-bounce">&#127922;</div>
    <h2 class="text-3xl font-bold mb-2" style="font-family:'Orbitron'">Ludo Lobby</h2>
    <p class="text-gray-500 text-lg">Need 2-4 players to start</p>
    <div class="flex gap-5 mt-8">
      <div class="w-5 h-5 rounded-full bg-red-500 animate-pulse"></div>
      <div class="w-5 h-5 rounded-full bg-green-500 animate-pulse" style="animation-delay:.15s"></div>
      <div class="w-5 h-5 rounded-full bg-yellow-500 animate-pulse" style="animation-delay:.3s"></div>
      <div class="w-5 h-5 rounded-full bg-blue-500 animate-pulse" style="animation-delay:.45s"></div>
    </div>
    <p id="playerCountText" class="text-sm text-gray-600 mt-5">Connecting...</p>
  </div>

  <div id="winner-overlay">
    <div class="text-7xl mb-4">&#127942;</div>
    <h1 class="text-5xl font-bold mb-3" style="font-family:'Orbitron'">WINNER</h1>
    <p id="winner-name" class="text-3xl font-bold" style="color:var(--primary)">Player</p>
    <button onclick="location.href='/'" class="neon-btn mt-8 px-8 py-3 rounded-xl text-lg">Back to Lobby</button>
  </div>

  <div class="flex flex-col md:flex-row items-center justify-center gap-6 p-4 hidden" id="gameContainer">
    <div class="glass rounded-2xl p-5 flex flex-col items-center gap-3 w-full md:w-52 order-2 md:order-1">
      <h3 style="font-family:'Orbitron'" class="text-lg tracking-wide">TURN <span id="turnIndicator" class="text-[var(--primary)]">—</span></h3>
      <div id="dice" class="dice-box disabled" onclick="requestRoll()">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <p id="diceResult" class="text-xs text-gray-500 h-5 text-center"></p>
      <div class="w-full space-y-2 mt-3">
        <div id="p-red" class="player-row flex justify-between items-center px-3 py-2 rounded-lg bg-red-500/10 border border-red-500/30 opacity-40"><span class="text-sm font-bold">Red</span><span id="score-red" class="text-xs text-gray-400">Waiting</span></div>
        <div id="p-green" class="player-row flex justify-between items-center px-3 py-2 rounded-lg bg-green-500/10 border border-green-500/30 opacity-40"><span class="text-sm font-bold">Green</span><span id="score-green" class="text-xs text-gray-400">Waiting</span></div>
        <div id="p-yellow" class="player-row flex justify-between items-center px-3 py-2 rounded-lg bg-yellow-500/10 border border-yellow-500/30 opacity-40"><span class="text-sm font-bold">Yellow</span><span id="score-yellow" class="text-xs text-gray-400">Waiting</span></div>
        <div id="p-blue" class="player-row flex justify-between items-center px-3 py-2 rounded-lg bg-blue-500/10 border border-blue-500/30 opacity-40"><span class="text-sm font-bold">Blue</span><span id="score-blue" class="text-xs text-gray-400">Waiting</span></div>
      </div>
    </div>
    <div id="ludo-board" class="order-1 md:order-2"></div>
  </div>

  <script src="/voice-manager.js"></script>
  <script>
    const socket = io();
    const partyCode = localStorage.getItem('partyCode');
    const myName = localStorage.getItem('watchNightName');
    const myUid = localStorage.getItem('watchNightUid');
    let myColor = null;
    let currentGameState = {};

    if (!partyCode) window.location.href = '/';

    /* --- Toast System --- */
    function showToast(message, type = 'info') {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = `toast-item toast-${type}`;
      t.innerText = message;
      c.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 3000);
    }

    /* --- Board Generation --- */
    const board = document.getElementById('ludo-board');
    function createBoard() {
        board.innerHTML = '';
        for(let r=0; r<15; r++) {
            for(let c=0; c<15; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.row = r;
                cell.dataset.col = c;

                // Zones
                if(r<6 && c<6) cell.classList.add('zone-red');
                else if(r<6 && c>8) cell.classList.add('zone-green');
                else if(r>8 && c>8) cell.classList.add('zone-yellow');
                else if(r>8 && c<6) cell.classList.add('zone-blue');
                
                // Center
                if(r>5 && r<9 && c>5 && c<9) cell.classList.add('center-cell');

                // Path Coloring Logic
                if( (r === 6 || r === 8) && (c < 6 || c > 8) ) cell.classList.add('path-cell');
                if( (c === 6 || c === 8) && (r < 6 || r > 8) ) cell.classList.add('path-cell');
                
                // Home Stretches
                if(r === 7 && c > 0 && c < 6) cell.classList.add('path-cell', 'hs-red');
                if(c === 7 && r > 0 && r < 6) cell.classList.add('path-cell', 'hs-green');
                if(r === 7 && c > 8 && c < 14) cell.classList.add('path-cell', 'hs-yellow');
                if(c === 7 && r > 8 && r < 14) cell.classList.add('path-cell', 'hs-blue');
                
                // Start Positions
                if(r===6 && c===1) { cell.classList.add('path-cell', 'start-red'); }
                if(r===1 && c===8) { cell.classList.add('path-cell', 'start-green'); }
                if(r===8 && c===13) { cell.classList.add('path-cell', 'start-yellow'); }
                if(r===13 && c===6) { cell.classList.add('path-cell', 'start-blue'); }

                board.appendChild(cell);
            }
        }
    }
    
    /* --- Coordinate Mapping --- */
    const PATH_MAP = { red: [], green: [], yellow: [], blue: [] };
    
    function initPaths() {
        // Main track coordinates (0-51) - Standard Ludo Path
        const mainPath = [
            [6,1],[6,2],[6,3],[6,4],[6,5], 
            [5,6],[4,6],[3,6],[2,6],[1,6],[0,6],
            [0,7],
            [0,8],[1,8],[2,8],[3,8],[4,8],[5,8],
            [6,9],[6,10],[6,11],[6,12],[6,13],
            [7,14],
            [8,13],[8,12],[8,11],[8,10],[8,9],
            [9,8],[10,8],[11,8],[12,8],[13,8],[14,8],
            [14,7],
            [14,6],[13,6],[12,6],[11,6],[10,6],[9,6],
            [8,5],[8,4],[8,3],[8,2],[8,1],
            [7,0],
            [6,0] // Wrap point
        ];
        
        // Red Path (Starts at 0)
        PATH_MAP.red = [...mainPath];
        PATH_MAP.red[51] = [7,1]; // Home Stretch Start
        PATH_MAP.red[52] = [7,2];
        PATH_MAP.red[53] = [7,3];
        PATH_MAP.red[54] = [7,4];
        PATH_MAP.red[55] = [7,5];
        PATH_MAP.red[56] = [7,6];
        PATH_MAP.red[57] = [7,7]; // Center

        // Green Path (Starts at 13 relative to red path)
        const gStart = mainPath.slice(13).concat(mainPath.slice(0, 13));
        PATH_MAP.green = [...gStart];
        PATH_MAP.green[51] = [1,7];
        PATH_MAP.green[52] = [2,7];
        PATH_MAP.green[53] = [3,7];
        PATH_MAP.green[54] = [4,7];
        PATH_MAP.green[55] = [5,7];
        PATH_MAP.green[56] = [6,7];
        PATH_MAP.green[57] = [7,7];

        // Yellow Path (Starts at 26)
        const yStart = mainPath.slice(26).concat(mainPath.slice(0, 26));
        PATH_MAP.yellow = [...yStart];
        PATH_MAP.yellow[51] = [7,13];
        PATH_MAP.yellow[52] = [7,12];
        PATH_MAP.yellow[53] = [7,11];
        PATH_MAP.yellow[54] = [7,10];
        PATH_MAP.yellow[55] = [7,9];
        PATH_MAP.yellow[56] = [7,8];
        PATH_MAP.yellow[57] = [7,7];

        // Blue Path (Starts at 39)
        const bStart = mainPath.slice(39).concat(mainPath.slice(0, 39));
        PATH_MAP.blue = [...bStart];
        PATH_MAP.blue[51] = [13,7];
        PATH_MAP.blue[52] = [12,7];
        PATH_MAP.blue[53] = [11,7];
        PATH_MAP.blue[54] = [10,7];
        PATH_MAP.blue[55] = [9,7];
        PATH_MAP.blue[56] = [8,7];
        PATH_MAP.blue[57] = [7,7];
    }
    
    initPaths();
    createBoard();

    /* --- Game Logic --- */
    
    window.onload = () => {
        initVoiceSystem(socket);
        socket.emit('join-party', { roomId: partyCode, name: myName, uid: myUid });
        socket.emit('join-ludo', { roomId: partyCode, name: myName, uid: myUid });
    };

    socket.on('party-joined', (d) => startVoice(d.roomId, myName));

    socket.on('ludo-update', (data) => {
        console.log("Ludo Update Received", data);
        document.getElementById('waitingScreen').classList.add('hidden');
        document.getElementById('gameContainer').classList.remove('hidden');
        
        currentGameState = data;
        
        // Identify my color
        if(!myColor) {
            for(let color in data.players) {
                if(data.players[color] && data.players[color].id === socket.id) {
                    myColor = color;
                    break;
                }
            }
        }

        renderPlayers(data.players);
        renderTokens(data.pieces);
        updateTurnUI(data.turn, data.dice);
    });

    socket.on('ludo-waiting', (data) => {
        document.getElementById('playerCountText').innerText = `Players: ${data.count}`;
    });

    socket.on('ludo-toast', (d) => showToast(d.msg, d.type));

    socket.on('ludo-error', (msg) => {
        showToast(msg, 'error');
        setTimeout(() => window.location.href = '/', 3000);
    });

    socket.on('ludo-winner', (data) => {
        document.getElementById('winner-name').innerText = data.name;
        document.getElementById('winner-name').style.color = `var(--${data.color})`;
        document.getElementById('winner-overlay').style.display = 'flex';
    });

    function renderPlayers(playersObj) {
        const colors = ['red', 'green', 'yellow', 'blue'];
        colors.forEach(c => {
            const el = document.getElementById(`p-${c}`);
            const p = playersObj[c];
            
            if(p) {
                el.style.opacity = 1;
                el.querySelector('span:first-child').innerText = p.name;
                el.querySelector('span:last-child').innerText = p.id === socket.id ? '(You)' : '';
            } else {
                el.style.opacity = 0.4;
                el.querySelector('span:first-child').innerText = c.charAt(0).toUpperCase() + c.slice(1);
                el.querySelector('span:last-child').innerText = 'Waiting...';
            }
        });
    }

    function renderTokens(piecesObj) {
        // Clear existing tokens
        document.querySelectorAll('.token').forEach(t => t.remove());

        for(let key in piecesObj) {
            const piece = piecesObj[key];
            if(piece.pos === 'home') continue; 

            const coord = getPathCoord(piece.color, piece.pos);
            if(!coord) continue;

            const cell = document.querySelector(`.cell[data-row="${coord[0]}"][data-col="${coord[1]}"]`);
            if(cell) {
                const token = document.createElement('div');
                token.className = `token token-${piece.color}`;
                token.dataset.color = piece.color;
                token.dataset.id = key;
                token.onclick = () => attemptMove(key);
                cell.appendChild(token);
            }
        }
    }

    function getPathCoord(color, pos) {
        if(pos === 'finished') return PATH_MAP[color][57];
        if(typeof pos === 'number') return PATH_MAP[color][pos];
        return null;
    }

    function updateTurnUI(turnColor, diceVal) {
        document.querySelectorAll('.player-row').forEach(r => r.classList.remove('active-turn'));
        if(turnColor && document.getElementById(`p-${turnColor}`)) {
            document.getElementById(`p-${turnColor}`).classList.add('active-turn');
        }
        
        document.getElementById('turnIndicator').innerText = turnColor ? turnColor.toUpperCase() : '—';
        
        const diceEl = document.getElementById('dice');
        
        if(currentGameState.active && myColor === turnColor) {
            if(!diceVal) {
                diceEl.classList.remove('disabled');
                document.querySelectorAll('.token.highlight').forEach(t => t.classList.remove('highlight'));
            } else {
                highlightMoves(myColor, diceVal);
                diceEl.classList.add('disabled');
            }
        } else {
            diceEl.classList.add('disabled');
            document.querySelectorAll('.token.highlight').forEach(t => t.classList.remove('highlight'));
        }
        
        if(diceVal) setDice(diceVal);
        else setDice(0);
    }

    function setDice(val) {
        const d = document.getElementById('dice');
        d.classList.remove('rolling');
        void d.offsetWidth;
        d.classList.add('rolling');
        
        d.querySelectorAll('.dot').forEach(dot => dot.classList.remove('on'));
        setTimeout(() => {
            const patterns = {
                1: [4], 2: [0,8], 3: [0,4,8], 4: [0,2,6,8], 5: [0,2,4,6,8], 6: [0,2,3,5,6,8]
            };
            if(patterns[val]) patterns[val].forEach(i => d.children[i].classList.add('on'));
            document.getElementById('diceResult').innerText = val > 0 ? `Rolled: ${val}` : '';
        }, 300);
    }

    function requestRoll() {
        if(currentGameState.turn === myColor && !currentGameState.dice) {
            socket.emit('roll-dice');
        }
    }

    function highlightMoves(color, dice) {
        document.querySelectorAll('.token.highlight').forEach(t => t.classList.remove('highlight'));
        
        const pieces = currentGameState.pieces;
        
        for(let key in pieces) {
            if(pieces[key].color === color) {
                const p = pieces[key];
                // Logic: Can this piece move?
                if(p.pos === 'home' && dice === 6) {
                     // Need to show indicator for home pieces?
                     // For now, just allow clicking the board start or UI element.
                     // Ideally, show tokens in home.
                     // Let's just add a visual indicator logic here if needed.
                } 
                else if (p.pos !== 'home' && p.pos !== 'finished') {
                     const tok = document.querySelector(`.token[data-id="${key}"]`);
                     if(tok) tok.classList.add('highlight');
                }
            }
        }
    }

    function attemptMove(tokenId) {
        const el = document.querySelector(`.token[data-id="${tokenId}"]`);
        if(el && el.classList.contains('highlight')) {
            socket.emit('move-token', { tokenId });
        }
    }
  </script>
</body>
</html>
