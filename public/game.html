<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch-Night | Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #00f3ff; --secondary: #bc13fe; --bg: #050505; }
    body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; overflow: hidden; }
    .glass { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .neon-btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: black; font-weight: bold; transition: all 0.3s; }
    .neon-btn:hover { filter: brightness(1.2); box-shadow: 0 0 20px var(--primary); }
    
    .ttt-grid { display: grid; grid-template-columns: repeat(3, 90px); grid-template-rows: repeat(3, 90px); gap: 8px; }
    .ttt-cell { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron'; font-size: 2.8rem; line-height: 1; cursor: pointer; transition: all 0.2s; min-width: 90px; min-height: 90px; max-width: 90px; max-height: 90px; overflow: hidden; }
    .ttt-cell:hover { background: rgba(255,255,255,0.1); }
    .ttt-cell.p1 { color: var(--primary); text-shadow: 0 0 20px var(--primary); }
    .ttt-cell.p2 { color: var(--secondary); text-shadow: 0 0 20px var(--secondary); }
    .ttt-cell.disabled { pointer-events: none; opacity: 0.5; }
    .ttt-cell.win-cell { background: rgba(0,243,255,0.15); border-color: var(--primary); }
    .ttt-cell.win-cell.p2 { background: rgba(188,19,254,0.15); border-color: var(--secondary); }
    
    .p1-color { color: var(--primary); text-shadow: 0 0 10px var(--primary); }
    .p2-color { color: var(--secondary); text-shadow: 0 0 10px var(--secondary); }

    .scoreboard { display: flex; align-items: center; gap: 16px; }
    .score-box { text-align: center; min-width: 70px; }
    .score-box .score-value { font-family: 'Orbitron'; font-size: 2rem; font-weight: 900; line-height: 1; }
    .score-box .score-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.6; }
    .score-divider { font-size: 1.5rem; opacity: 0.3; }

    .result-banner { animation: resultPop 0.4s ease-out; }
    @keyframes resultPop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    .restart-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 20px; border-radius: 8px; cursor: pointer; transition: all 0.3s; font-size: 14px; }
    .restart-btn:hover { background: var(--primary); color: black; border-color: var(--primary); }
    .restart-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .restart-btn:disabled:hover { background: rgba(255,255,255,0.1); color: white; border-color: rgba(255,255,255,0.2); }

    .countdown { font-family: 'Orbitron'; font-size: 0.85rem; opacity: 0.7; }

    #backBtn { position: fixed; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; gap: 5px; text-decoration: none; color: white; font-size: 14px; transition: all 0.3s; }
    #backBtn:hover { background: var(--primary); color: black; }

    /* Toast */
    @keyframes slideIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 99999; display: flex; flex-direction: column; gap: 8px; }
    .toast-item { padding: 10px 18px; border-radius: 10px; font-size: 0.875rem; font-weight: 500; backdrop-filter: blur(10px); animation: slideIn 0.4s ease; border-left: 3px solid; }
    .toast-success { background: rgba(0,0,0,0.8); color: #4ade80; border-color: #4ade80; }
    .toast-info { background: rgba(0,0,0,0.8); color: #22d3ee; border-color: #22d3ee; }
  </style>
</head>
<body class="h-screen w-screen flex flex-col">

  <div class="toast-container" id="toastContainer"></div>

  <!-- Back to Lobby Button -->
  <a href="/?skipSplash=1" id="backBtn">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    Lobby
  </a>

  <div id="noCodeScreen" class="hidden h-screen w-screen flex items-center justify-center flex-col z-50 bg-black">
    <h1 class="text-2xl font-bold text-red-500">No Party Code Found</h1>
    <a href="/" class="mt-4 neon-btn px-6 py-2 rounded-lg">Go to Hub</a>
  </div>

  <div id="waitingScreen" class="hidden h-screen w-screen flex flex-col items-center justify-center">
     <div class="text-2xl mb-4">Connecting to Party...</div>
     <div id="displayCode" class="text-xl text-gray-400"></div>
  </div>

  <div id="gameArea" class="hidden flex-1 flex flex-col items-center justify-center p-4"></div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/voice-manager.js"></script>
  <script>
    const socket = io();
    let myName = localStorage.getItem('watchNightName');
    let partyCode = localStorage.getItem('partyCode');
    let currentGame = null;

    // Score tracking
    let scores = { myWins: 0, oppWins: 0, draws: 0 };
    let autoRestartTimer = null;
    let countdownInterval = null;
    let countdownValue = 5;
    let restartRequested = false;

    /* ── Toast System ── */
    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast-item toast-${type}`;
      toast.innerHTML = `<div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full ${type==='success'?'bg-green-400':'bg-cyan-400'}"></span>${message}</div>`;
      container.appendChild(toast);
      setTimeout(() => { toast.style.transition = 'all 0.4s ease'; toast.style.opacity = '0'; toast.style.transform = 'translateX(100px)'; setTimeout(() => toast.remove(), 400); }, 3000);
    }

    window.onload = () => {
      if(!partyCode) {
        document.getElementById('noCodeScreen').classList.remove('hidden');
        return;
      }
      
      initVoiceSystem(socket);

      document.getElementById('waitingScreen').classList.remove('hidden');
      document.getElementById('displayCode').innerText = `Party: ${partyCode}`;
      
      socket.emit('join-party', { roomId: partyCode, name: myName, uid: localStorage.getItem('watchNightUid') });
      socket.emit('join-game-room', { roomId: partyCode, name: myName });
    };

    socket.on('party-joined', (data) => {
       startVoice(data.roomId, myName);
    });
    
    // Join/leave notifications
    socket.on('user-joined-msg', (data) => showToast(`${data.name} joined`, 'success'));
    socket.on('user-left-msg', (data) => showToast(`${data.name} left`, 'info'));

    socket.on('game-waiting', () => {
       document.getElementById('gameArea').innerHTML = '<div class="text-center"><div class="text-xl animate-pulse">Waiting for Opponent...</div><div class="text-gray-400 mt-2">Share the Party Code</div></div>';
       document.getElementById('gameArea').classList.remove('hidden');
    });

    socket.on('game-start', (game) => {
      currentGame = game;
      clearTimers();
      renderGame();
    });

    socket.on('game-update', (data) => {
      currentGame.board = data.board;
      currentGame.turn = data.turn;
      currentGame.players = data.players;

      if (data.result) {
        const me = currentGame.players.find(p => p.id === socket.id);
        if (data.result.draw) scores.draws++;
        else if (data.result.winner === me.symbol) scores.myWins++;
        else scores.oppWins++;
      }

      renderGame(data.result);
    });

    socket.on('game-error', (msg) => {
      alert(msg);
      window.location.href = '/';
    });

    socket.on('restart-requested', () => {
      const btn = document.getElementById('restartBtn');
      if (btn && !restartRequested) btn.textContent = 'Opponent wants rematch!';
    });

    function clearTimers() {
      if (autoRestartTimer) { clearTimeout(autoRestartTimer); autoRestartTimer = null; }
      if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
      restartRequested = false;
    }

    function startAutoRestart() {
      clearTimers();
      countdownValue = 5;
      restartRequested = false;

      countdownInterval = setInterval(() => {
        countdownValue--;
        const el = document.getElementById('countdownText');
        if (el) el.textContent = `Auto-restart in ${countdownValue}s`;
        if (countdownValue <= 0) { clearInterval(countdownInterval); countdownInterval = null; }
      }, 1000);

      autoRestartTimer = setTimeout(() => {
        autoRestartTimer = null;
        requestRestart();
      }, 5000);
    }

    function requestRestart() {
      if (restartRequested) return;
      restartRequested = true;
      socket.emit('request-restart', { roomId: partyCode });
      const btn = document.getElementById('restartBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'Waiting...'; }
    }

    function renderGame(result = null) {
      const me = currentGame.players.find(p => p.id === socket.id);
      const opp = currentGame.players.find(p => p.id !== socket.id);
      const isMyTurn = currentGame.turn === me.symbol;

      let winCells = [];
      if (result && result.winner && result.line) winCells = result.line;

      let resultText = '', resultClass = '';
      if (result) {
        if (result.draw) { resultText = "It's a Draw!"; resultClass = 'text-yellow-400'; }
        else if (result.winner === me.symbol) { resultText = 'You Win!'; resultClass = 'p1-color'; }
        else { resultText = 'You Lose!'; resultClass = 'p2-color'; }
      }

      let html = `
        <div class="glass p-4 rounded-xl mb-4 flex justify-between items-center w-full max-w-md">
            <div class="text-center ${me.symbol === 'X' ? 'p1-color' : 'p2-color'}">
                <div class="font-bold text-sm">${me.name} (You)</div>
                <div class="text-xs opacity-60">${me.symbol}</div>
            </div>
            <div class="text-xl font-bold text-white">VS</div>
            <div class="text-center ${opp.symbol === 'X' ? 'p1-color' : 'p2-color'}">
                <div class="font-bold text-sm">${opp.name}</div>
                <div class="text-xs opacity-60">${opp.symbol}</div>
            </div>
        </div>

        <div class="glass p-3 rounded-xl mb-4 w-full max-w-md">
          <div class="scoreboard justify-center">
            <div class="score-box">
              <div class="score-value p1-color">${scores.myWins}</div>
              <div class="score-label">You</div>
            </div>
            <div class="score-divider">|</div>
            <div class="score-box">
              <div class="score-value text-yellow-400">${scores.draws}</div>
              <div class="score-label">Draw</div>
            </div>
            <div class="score-divider">|</div>
            <div class="score-box">
              <div class="score-value p2-color">${scores.oppWins}</div>
              <div class="score-label">Opp</div>
            </div>
          </div>
        </div>

        <h3 class="text-xl font-bold mb-3 ${result ? resultClass : (isMyTurn ? 'text-green-400' : 'text-gray-400')}">
            ${result ? `<span class="result-banner inline-block">${resultText}</span>` : (isMyTurn ? 'Your Turn' : 'Opponent Turn')}
        </h3>
        <div class="ttt-grid">
      `;

      currentGame.board.forEach((cell, i) => {
        const isWinCell = winCells.includes(i);
        const cellClass = `ttt-cell ${cell === 'X' ? 'p1' : (cell === 'O' ? 'p2' : '')} ${!isMyTurn || cell || result ? 'disabled' : ''} ${isWinCell ? 'win-cell' : ''}`;
        html += `<div class="${cellClass}" onclick="move(${i})">${cell || ''}</div>`;
      });

      html += `</div>`;

      if (result) {
        html += `
          <div class="mt-4 flex flex-col items-center gap-2">
            <button id="restartBtn" class="restart-btn" onclick="requestRestart()">
              ${restartRequested ? 'Waiting for Opponent...' : 'Play Again'}
            </button>
            <div id="countdownText" class="countdown">Auto-restart in ${countdownValue}s</div>
          </div>
        `;
      }

      document.getElementById('gameArea').innerHTML = html;
      document.getElementById('gameArea').classList.remove('hidden');
      document.getElementById('waitingScreen').classList.add('hidden');

      if (result && !autoRestartTimer) startAutoRestart();
    }

    function move(index) {
      socket.emit('play-move', { index });
    }
  </script>
</body>
</html>
