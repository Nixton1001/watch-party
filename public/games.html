<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Watch-Night | Game Zone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #00f3ff; --secondary: #bc13fe; --bg: #050505; }
    body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; overflow: hidden; }
    
    @keyframes fadeIn { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes glowPulse { 0% { box-shadow: 0 0 20px var(--primary); } 50% { box-shadow: 0 0 40px var(--primary), 0 0 60px var(--secondary); } 100% { box-shadow: 0 0 20px var(--primary); } }
    @keyframes pop { 0% { transform: scale(0); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

    .glass { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .neon-btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: black; font-weight: bold; transition: all 0.3s; border: none; }
    .neon-btn:hover { filter: brightness(1.2); box-shadow: 0 0 20px var(--primary); transform: translateY(-2px); }
    
    .p1-color { color: #00f3ff; }
    .p2-color { color: #bc13fe; }

    .game-card { transition: all 0.3s; cursor: pointer; }
    .game-card:hover { transform: scale(1.03); border-color: var(--primary); }
    
    .anim-fade-in { animation: fadeIn 0.5s ease forwards; }

    /* Tic Tac Toe Styles */
    .ttt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 280px; height: 280px; }
    .ttt-cell { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; font-size: 4rem; cursor: pointer; transition: all 0.2s; }
    .ttt-cell:hover { background: rgba(255,255,255,0.1); }
    .ttt-cell.p1 { color: var(--primary); text-shadow: 0 0 20px var(--primary); }
    .ttt-cell.p2 { color: var(--secondary); text-shadow: 0 0 20px var(--secondary); }
    .ttt-cell.win { animation: glowPulse 1s infinite; background: rgba(255,255,255,0.1); }
    
    /* Reflex Duel Specific */
    .reflex-zone { transition: background 0.1s; }
    .reflex-active { background: rgba(0, 243, 255, 0.3) !important; }
    .reflex-wait { background: rgba(188, 19, 254, 0.1) !important; }
  </style>
</head>
<body class="h-screen w-screen flex flex-col">

  <!-- HEADER / SCOREBOARD -->
  <header id="scoreBoard" class="hidden glass p-3 border-b border-white/10 flex justify-between items-center z-50 relative">
    <div class="flex items-center gap-2">
      <div class="w-2 h-2 rounded-full bg-[var(--primary)]"></div>
      <span id="p1NameDisplay" class="font-bold p1-color">P1</span>
      <span id="p1ScoreDisplay" class="text-xl font-bold">0</span>
    </div>
    <button onclick="resetGame()" class="text-xs text-gray-500 hover:text-white uppercase tracking-widest">Exit</button>
    <div class="flex items-center gap-2">
      <span id="p2ScoreDisplay" class="text-xl font-bold">0</span>
      <span id="p2NameDisplay" class="font-bold p2-color">P2</span>
      <div class="w-2 h-2 rounded-full bg-[var(--secondary)]"></div>
    </div>
  </header>

  <main class="flex-1 relative overflow-y-auto">
    
    <!-- SCREEN 1: LOBBY -->
    <div id="lobbyScreen" class="h-full w-full flex flex-col items-center justify-center p-6">
      <div class="glass p-8 rounded-2xl w-full max-w-md space-y-6 border-l-4 border-l-[var(--primary)] relative overflow-hidden anim-fade-in">
        <div class="text-center">
          <h1 class="text-4xl font-bold mb-2" style="font-family: 'Orbitron'">GAME ZONE</h1>
          <p class="text-gray-500 text-sm">Enter Player Names</p>
        </div>
        
        <div class="space-y-4">
          <div>
            <label class="text-xs text-[var(--primary)] uppercase tracking-widest mb-1 block">Player 1 (X)</label>
            <input type="text" id="p1Input" placeholder="Name" class="w-full bg-black/50 border border-white/10 rounded p-3 text-lg focus:outline-none focus:border-[var(--primary)]">
          </div>
          <div>
            <label class="text-xs text-[var(--secondary)] uppercase tracking-widest mb-1 block">Player 2 (O)</label>
            <input type="text" id="p2Input" placeholder="Name" class="w-full bg-black/50 border border-white/10 rounded p-3 text-lg focus:outline-none focus:border-[var(--secondary)]">
          </div>
          
          <button onclick="startSession()" class="w-full neon-btn py-3 rounded-lg text-xl mt-4">START</button>
        </div>
        <a href="/" class="block text-center text-gray-500 hover:text-white text-xs mt-4">← Back to Hub</a>
      </div>
    </div>

    <!-- SCREEN 2: GAME MENU -->
    <div id="menuScreen" class="hidden h-full w-full flex flex-col items-center justify-center p-6">
      <div class="text-center mb-8 anim-fade-in">
        <h2 class="text-3xl font-bold" style="font-family: 'Orbitron'">SELECT GAME</h2>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-3xl px-4">
        <!-- Game 1: Tic Tac Toe -->
        <div onclick="startGame('tictactoe')" class="game-card glass p-6 rounded-2xl border border-white/10 anim-fade-in" style="animation-delay: 0.1s">
          <div class="flex justify-between items-start mb-4">
            <div class="text-4xl">⭕</div>
            <span class="text-xs bg-white/10 px-2 py-1 rounded">Classic</span>
          </div>
          <h3 class="text-xl font-bold">Tic Tac Toe</h3>
          <p class="text-gray-400 mt-1 text-sm">Classic X and O battle for the grid.</p>
        </div>

        <!-- Game 2: Reflex Duel -->
        <div onclick="startGame('reflex')" class="game-card glass p-6 rounded-2xl border border-white/10 anim-fade-in" style="animation-delay: 0.2s">
          <div class="flex justify-between items-start mb-4">
            <div class="text-4xl">⚡</div>
            <span class="text-xs bg-white/10 px-2 py-1 rounded">Versus</span>
          </div>
          <h3 class="text-xl font-bold">Reflex Duel</h3>
          <p class="text-gray-400 mt-1 text-sm">Test your reaction speed.</p>
        </div>
      </div>
    </div>

    <!-- SCREEN 3: GAME CONTAINER -->
    <div id="gameScreen" class="hidden h-full w-full flex flex-col items-center justify-center p-4 relative">
      <!-- Dynamic Content Injected Here -->
    </div>

  </main>

  <script>
    // --- STATE ---
    let p1 = { name: 'Player 1', score: 0 };
    let p2 = { name: 'Player 2', score: 0 };
    let currentGame = null;
    let reflexTimeout = null;

    // --- CORE LOGIC ---
    function startSession() {
      p1.name = document.getElementById('p1Input').value || 'Player 1';
      p2.name = document.getElementById('p2Input').value || 'Player 2';
      
      updateScoreDisplay();
      
      document.getElementById('lobbyScreen').classList.add('hidden');
      document.getElementById('scoreBoard').classList.remove('hidden');
      document.getElementById('menuScreen').classList.remove('hidden');
    }

    function updateScoreDisplay() {
      document.getElementById('p1NameDisplay').innerText = p1.name;
      document.getElementById('p2NameDisplay').innerText = p2.name;
      document.getElementById('p1ScoreDisplay').innerText = p1.score;
      document.getElementById('p2ScoreDisplay').innerText = p2.score;
    }

    function addScore(player, points) {
      if (player === 1) p1.score += points;
      if (player === 2) p2.score += points;
      updateScoreDisplay();
    }

    function resetGame() {
      clearTimeout(reflexTimeout);
      currentGame = null;
      document.getElementById('gameScreen').classList.add('hidden');
      document.getElementById('menuScreen').classList.remove('hidden');
      document.getElementById('gameScreen').innerHTML = '';
    }

    function startGame(game) {
      document.getElementById('menuScreen').classList.add('hidden');
      document.getElementById('gameScreen').classList.remove('hidden');
      
      if(game === 'tictactoe') initTicTacToe();
      if(game === 'reflex') initReflex();
    }

    // --- GAME 1: TIC TAC TOE ---
    let board = Array(9).fill(null);
    let currentPlayer = 1; // 1 for P1 (X), 2 for P2 (O)
    let gameActive = true;

    const winPatterns = [
      [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
      [0, 3, 6], [1, 4, 7], [2, 5, 8], // Cols
      [0, 4, 8], [2, 4, 6]             // Diagonals
    ];

    function initTicTacToe() {
      board = Array(9).fill(null);
      currentPlayer = 1;
      gameActive = true;
      renderTTTBoard();
    }

    function renderTTTBoard() {
      const container = document.getElementById('gameScreen');
      const turnText = currentPlayer === 1 ? `${p1.name}'s Turn (X)` : `${p2.name}'s Turn (O)`;
      const turnClass = currentPlayer === 1 ? 'p1-color' : 'p2-color';

      let html = `
        <div class="text-center anim-fade-in">
          <h3 id="tttStatus" class="text-2xl font-bold mb-6 ${turnClass}">${turnText}</h3>
          <div class="ttt-grid mb-6">
      `;

      board.forEach((cell, index) => {
        const cellClass = cell === 1 ? 'p1' : (cell === 2 ? 'p2' : '');
        const symbol = cell === 1 ? 'X' : (cell === 2 ? 'O' : '');
        html += `<div class="ttt-cell ${cellClass}" onclick="handleTTTClick(${index})">${symbol}</div>`;
      });

      html += `
          </div>
          <button onclick="initTicTacToe()" class="outline-btn px-6 py-2 rounded-lg text-sm border border-white/20 hover:border-white/40">
            Restart Round
          </button>
        </div>
      `;

      container.innerHTML = html;
    }

    function handleTTTClick(index) {
      if (!gameActive || board[index]) return;

      // Set cell
      board[index] = currentPlayer;

      // Check Win
      const winner = checkTTTWin();
      if (winner) {
        gameActive = false;
        highlightWin(winner.pattern);
        const winnerName = winner.player === 1 ? p1.name : p2.name;
        document.getElementById('tttStatus').innerText = `${winnerName} Wins! 🎉`;
        document.getElementById('tttStatus').className = winner.player === 1 ? 'text-2xl font-bold mb-6 p1-color' : 'text-2xl font-bold mb-6 p2-color';
        addScore(winner.player, 50);
        return;
      }

      // Check Draw
      if (!board.includes(null)) {
        gameActive = false;
        document.getElementById('tttStatus').innerText = "It's a Draw!";
        document.getElementById('tttStatus').className = 'text-2xl font-bold mb-6 text-gray-400';
        return;
      }

      // Switch Turn
      currentPlayer = currentPlayer === 1 ? 2 : 1;
      renderTTTBoard();
    }

    function checkTTTWin() {
      for (let pattern of winPatterns) {
        const [a, b, c] = pattern;
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return { player: board[a], pattern: pattern };
        }
      }
      return null;
    }

    function highlightWin(pattern) {
      const cells = document.querySelectorAll('.ttt-cell');
      pattern.forEach(index => {
        cells[index].classList.add('win');
      });
    }

    // --- GAME 2: REFLEX DUEL ---
    function initReflex() {
      const container = document.getElementById('gameScreen');
      container.innerHTML = `
        <div class="w-full h-full flex flex-col items-center justify-center">
           <div class="text-center mb-8 anim-fade-in">
             <h3 class="text-2xl font-bold">Reflex Duel</h3>
             <p class="text-gray-400">First to tap when the screen flashes wins!</p>
           </div>
           
           <div class="w-full h-64 flex gap-2">
             <div id="zone1" class="flex-1 glass flex items-center justify-center text-2xl font-bold rounded-xl cursor-pointer border border-[var(--primary)] hover:border-white transition-all" onclick="reflexTap(1)">
               ${p1.name}<br><span class="text-xs opacity-50">TAP HERE</span>
             </div>
             <div id="zone2" class="flex-1 glass flex items-center justify-center text-2xl font-bold rounded-xl cursor-pointer border border-[var(--secondary)] hover:border-white transition-all" onclick="reflexTap(2)">
               ${p2.name}<br><span class="text-xs opacity-50">TAP HERE</span>
             </div>
           </div>
           
           <button id="startReflexBtn" onclick="startReflexRound()" class="neon-btn px-8 py-3 rounded-xl text-xl mt-8">Start Round</button>
           <div id="reflexMsg" class="h-8 mt-4 text-xl font-bold text-[var(--primary)]"></div>
        </div>
      `;
    }

    let canTap = false;

    function startReflexRound() {
      canTap = false;
      const zone1 = document.getElementById('zone1');
      const zone2 = document.getElementById('zone2');
      const msg = document.getElementById('reflexMsg');
      const btn = document.getElementById('startReflexBtn');
      
      btn.style.display = 'none';
      msg.innerText = "Wait for GREEN...";
      msg.className = "h-8 mt-4 text-xl font-bold text-yellow-500";
      zone1.classList.add('reflex-wait');
      zone2.classList.add('reflex-wait');

      const delay = (Math.random() * 3000) + 2000;

      reflexTimeout = setTimeout(() => {
        canTap = true;
        msg.innerText = "GO!";
        msg.className = "h-8 mt-4 text-xl font-bold text-green-500";
        zone1.classList.remove('reflex-wait');
        zone2.classList.remove('reflex-wait');
        zone1.classList.add('reflex-active');
        zone2.classList.add('reflex-active');
      }, delay);
    }

    function reflexTap(player) {
      const zone1 = document.getElementById('zone1');
      const zone2 = document.getElementById('zone2');
      const msg = document.getElementById('reflexMsg');

      if (!canTap) {
        clearTimeout(reflexTimeout);
        const winner = player === 1 ? p2 : p1;
        msg.innerText = `Too early! ${winner.name} gets the point!`;
        msg.className = "h-8 mt-4 text-xl font-bold text-red-500";
        addScore(player === 1 ? 2 : 1, 20);
        
        zone1.classList.remove('reflex-wait');
        zone2.classList.remove('reflex-wait');
        document.getElementById('startReflexBtn').style.display = 'block';
        return;
      }

      canTap = false;
      const winnerName = player === 1 ? p1.name : p2.name;
      
      msg.innerText = `${winnerName} wins the round!`;
      msg.className = player === 1 ? "h-8 mt-4 text-xl font-bold p1-color" : "h-8 mt-4 text-xl font-bold p2-color";
      addScore(player, 20);

      zone1.classList.remove('reflex-active');
      zone2.classList.remove('reflex-active');
      
      setTimeout(() => {
        document.getElementById('startReflexBtn').style.display = 'block';
      }, 1000);
    }
  </script>
</body>
</html>
