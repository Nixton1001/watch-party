<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch-Night | Room Lobby</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #00f3ff; --secondary: #bc13fe; --bg: #050505; }
    body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; overflow: hidden; }
    .glass { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .neon-btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: black; font-weight: bold; transition: all 0.3s; border: none; }
    .neon-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
    .outline-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; transition: all 0.3s; }
    .outline-btn:hover { border-color: var(--primary); color: var(--primary); background: rgba(0, 243, 255, 0.05); }
    .room-code-big { font-family: 'Orbitron', sans-serif; font-size: 3rem; font-weight: 900; letter-spacing: 8px; color: var(--primary); text-shadow: 0 0 15px var(--primary); cursor: pointer; }
  </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center p-6">

  <div class="text-center glass p-8 rounded-2xl max-w-md w-full">
    <!-- Code Display -->
    <div class="mb-8">
      <div class="text-xs text-gray-500 uppercase tracking-widest mb-2">YOUR ROOM CODE</div>
      <div id="roomCode" class="room-code-big" onclick="copyCode()">------</div>
      <div class="text-xs text-gray-600 mt-2">Click to copy</div>
    </div>

    <!-- Divider -->
    <div class="border-t border-white/10 pt-6">
      <div class="text-sm text-gray-400 mb-4">Choose an Activity</div>
      
      <div class="space-y-3">
        <!-- Watch Together -->
        <button onclick="goTo('watch')" class="w-full neon-btn py-3 rounded-xl text-lg flex items-center justify-center gap-2">
          <span class="text-2xl">🎬</span> Watch Together
        </button>

        <!-- Game Zone -->
        <button onclick="goTo('game')" class="w-full outline-btn py-3 rounded-xl text-lg flex items-center justify-center gap-2">
          <span class="text-2xl">🎮</span> Game Zone
        </button>

        <!-- Coming Soon -->
        <button class="w-full outline-btn py-3 rounded-xl text-lg opacity-50 cursor-not-allowed flex items-center justify-center gap-2">
          <span class="text-2xl">🚀</span> More (Coming Soon)
        </button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io();
    const urlParams = new URLSearchParams(window.location.search);
    const roomId = urlParams.get('room');
    const isHost = urlParams.get('host') === 'true'; // Passed from index.html
    const myName = localStorage.getItem('watchNightName') || 'Guest';

    if(!roomId) window.location.href = '/';

    document.getElementById('roomCode').innerText = roomId;

    socket.emit('join-waiting', { roomId: roomId, name: myName });

    function copyCode() {
      navigator.clipboard.writeText(roomId);
      const el = document.getElementById('roomCode');
      const orig = el.innerText;
      el.innerText = "COPIED!";
      el.style.color = "#ffffff";
      setTimeout(() => { el.innerText = orig; el.style.color = "var(--primary)"; }, 1000);
    }

    function goTo(page) {
      let url = '';
      if(page === 'watch') {
        // If host, action=create. If not, action=join.
        const action = isHost ? 'create' : 'join';
        url = `/watch.html?action=${action}&room=${roomId}&name=${encodeURIComponent(myName)}`;
      } else if (page === 'game') {
        url = `/game.html?room=${roomId}&name=${encodeURIComponent(myName)}`;
      }
      window.location.href = url;
    }
  </script>
</body>
</html>
