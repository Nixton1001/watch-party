<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Watch-Night | Think & Draw</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #00f3ff; --secondary: #bc13fe; --bg: #050505; }
    body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; overflow: hidden; }
    .glass { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .neon-btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: black; font-weight: bold; transition: all 0.3s; }
    .neon-btn:hover { filter: brightness(1.2); box-shadow: 0 0 20px var(--primary); }
    
    canvas { background: #1a1a1a; border-radius: 12px; cursor: crosshair; touch-action: none; }
    
    .word-btn { background: rgba(255,255,255,0.1); border: 2px solid var(--primary); transition: all 0.2s; }
    .word-btn:hover { background: var(--primary); color: black; transform: scale(1.05); }

    .chat-msg { padding: 4px 8px; border-radius: 8px; margin-bottom: 4px; }
    .system-msg { color: var(--secondary); font-style: italic; text-align: center; font-size: 0.9rem; }
    .close-msg { background: rgba(255, 165, 0, 0.2); color: orange; }
    .correct-msg { background: rgba(0, 255, 0, 0.2); color: #00ff00; font-weight: bold; }

    #backBtn { position: fixed; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); padding: 8px 12px; border-radius: 8px; display: flex; align-items: center; gap: 5px; text-decoration: none; color: white; font-size: 14px; transition: all 0.3s; }
    #backBtn:hover { background: var(--primary); color: black; }
  </style>
</head>
<body class="h-screen w-screen flex flex-col">

  <a href="/?skipSplash=1" id="backBtn">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    Lobby
  </a>

  <!-- WORD CHOICE MODAL -->
  <div id="wordModal" class="hidden fixed inset-0 z-[9999] bg-black/80 flex items-center justify-center">
    <div class="glass p-8 rounded-2xl text-center border border-[var(--primary)]">
      <h2 class="text-2xl font-bold mb-6" style="font-family:'Orbitron'">Choose a Word</h2>
      <div id="wordChoices" class="flex flex-col gap-3"></div>
    </div>
  </div>

  <!-- GAME OVER MODAL -->
  <div id="gameOverModal" class="hidden fixed inset-0 z-[9999] bg-black/90 flex items-center justify-center">
    <div class="glass p-8 rounded-2xl text-center border border-[var(--secondary)] max-w-md w-full">
      <div class="text-5xl mb-4">🏆</div>
      <h2 class="text-3xl font-bold mb-6" style="font-family:'Orbitron'">Game Over!</h2>
      <div id="finalScores" class="space-y-2 mb-6"></div>
      <a href="/?skipSplash=1" class="neon-btn px-6 py-2 rounded-lg inline-block">Back to Lobby</a>
    </div>
  </div>

  <!-- WAITING SCREEN -->
  <div id="waitingScreen" class="hidden h-screen w-screen flex flex-col items-center justify-center">
     <div class="text-6xl mb-4">🎨</div>
     <h2 class="text-2xl font-bold text-gray-300">Waiting for Players...</h2>
     <p class="text-gray-500 mt-2">Need at least 2 players to start</p>
  </div>

  <!-- MAIN GAME UI -->
  <div id="gameArea" class="hidden flex-1 flex flex-col md:flex-row p-4 gap-4 h-full">
    
    <!-- Left: Players List -->
    <div class="glass rounded-xl p-4 w-full md:w-64 flex flex-col gap-2 overflow-y-auto" id="playerList">
        <h3 class="text-center border-b border-white/10 pb-2 mb-2 font-bold text-[var(--primary)]">PLAYERS</h3>
    </div>

    <!-- Center: Canvas & Tools -->
    <div class="flex-1 flex flex-col gap-4">
        
        <!-- Top Bar: Timer & Word -->
        <div class="glass rounded-xl p-3 flex items-center justify-between">
            <div class="text-2xl font-bold font-mono text-[var(--primary)]" id="timerDisplay">60</div>
            <div class="flex-1 text-center">
                <div id="wordDisplay" class="text-3xl tracking-[0.3em] font-bold">_ _ _ _</div>
                <div class="text-xs text-gray-400 mt-1" id="roundInfo">Round 1/3</div>
            </div>
            <div class="w-10"></div>
        </div>

        <!-- Canvas Container -->
        <div class="flex-1 relative bg-black rounded-xl overflow-hidden shadow-lg border border-white/10" id="canvasContainer">
            <canvas id="drawCanvas"></canvas>
        </div>

        <!-- Tools (Visible only to Drawer) -->
        <div id="toolsBar" class="glass rounded-xl p-3 flex items-center justify-center gap-4 flex-wrap">
            <div class="flex gap-1">
                <button onclick="setColor('#ffffff')" class="w-8 h-8 rounded-full bg-white border-2 border-transparent hover:border-white"></button>
                <button onclick="setColor('#ff0000')" class="w-8 h-8 rounded-full bg-red-500 border-2 border-transparent hover:border-white"></button>
                <button onclick="setColor('#00ff00')" class="w-8 h-8 rounded-full bg-green-500 border-2 border-transparent hover:border-white"></button>
                <button onclick="setColor('#0000ff')" class="w-8 h-8 rounded-full bg-blue-500 border-2 border-transparent hover:border-white"></button>
                <button onclick="setColor('#ffff00')" class="w-8 h-8 rounded-full bg-yellow-400 border-2 border-transparent hover:border-white"></button>
                <button onclick="setColor('#000000')" class="w-8 h-8 rounded-full bg-black border-2 border-white/50 hover:border-white"></button>
            </div>
            <input type="range" id="brushSize" min="2" max="30" value="5" class="w-24" onchange="setBrushSize(this.value)">
            <button onclick="setEraser()" class="control-btn px-3 py-1 rounded text-sm">Eraser</button>
            <button onclick="clearBoard()" class="control-btn px-3 py-1 rounded text-sm bg-red-500/20 border-red-500 hover:bg-red-500 hover:text-white">Clear</button>
        </div>
    </div>

    <!-- Right: Chat -->
    <div class="glass rounded-xl w-full md:w-80 flex flex-col h-64 md:h-auto">
        <div class="p-3 border-b border-white/10 font-bold text-center text-sm text-gray-400">CHAT / GUESSES</div>
        <div id="chatBox" class="flex-1 p-3 overflow-y-auto flex flex-col-reverse">
            <div id="messages"></div>
        </div>
        <div class="p-2 border-t border-white/10">
            <input type="text" id="guessInput" placeholder="Type your guess..." class="w-full bg-black/50 border border-white/10 rounded-lg p-2 text-sm focus:outline-none focus:border-[var(--primary)]" onkeypress="if(event.key==='Enter')sendGuess()">
        </div>
    </div>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/voice-manager.js"></script>
  <script>
    const socket = io();
    let myName = localStorage.getItem('watchNightName');
    let partyCode = localStorage.getItem('partyCode');
    let isDrawer = false;
    
    // Canvas Setup
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;
    let currentColor = '#ffffff';
    let currentSize = 5;
    let lastX = 0;
    let lastY = 0;

    window.onload = () => {
        if(!partyCode) window.location.href = '/';
        initVoiceSystem(socket);
        
        // Resize on window change
        window.addEventListener('resize', resizeCanvas);

        // Voice chat in generic party room
        socket.emit('join-party', { roomId: partyCode, name: myName, uid: localStorage.getItem('watchNightUid') });
        
        // Join specific game room
        socket.emit('join-draw-room', { roomId: partyCode, name: myName });
    };

    function resizeCanvas() {
        const container = document.getElementById('canvasContainer');
        // Only resize if container is visible
        if(container.offsetParent === null) return;

        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        
        // Reset context settings after resize
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
    }

    // --- Drawing Events ---
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseout', stopDrawing);
    
    // Touch Support
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); const touch = e.touches[0]; const mouseEvent = new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY }); canvas.dispatchEvent(mouseEvent); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); const touch = e.touches[0]; const mouseEvent = new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY }); canvas.dispatchEvent(mouseEvent); });
    canvas.addEventListener('touchend', () => { const mouseEvent = new MouseEvent('mouseup', {}); canvas.dispatchEvent(mouseEvent); });

    function startDrawing(e) {
        if(!isDrawer) return;
        isDrawing = true;
        [lastX, lastY] = getPos(e);
        
        // Draw a dot for clicks
        ctx.beginPath();
        ctx.arc(lastX, lastY, currentSize/2, 0, Math.PI*2);
        ctx.fillStyle = currentColor;
        ctx.fill();

        socket.emit('draw-stroke', { type: 'start', x: lastX, y: lastY, color: currentColor, size: currentSize });
    }

    function draw(e) {
        if(!isDrawing || !isDrawer) return;
        const [x, y] = getPos(e);
        
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.strokeStyle = currentColor;
        ctx.lineWidth = currentSize;
        ctx.stroke();

        // Send data to server
        socket.emit('draw-stroke', { type: 'move', x, y, color: currentColor, size: currentSize });

        [lastX, lastY] = [x, y];
    }

    function stopDrawing() {
        isDrawing = false;
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        return [x, y];
    }

    // --- Remote Drawing ---
    let remoteLastX = 0;
    let remoteLastY = 0;

    socket.on('draw-stroke', (data) => {
        if(data.type === 'start') {
            ctx.beginPath();
            ctx.arc(data.x, data.y, data.size/2, 0, Math.PI*2);
            ctx.fillStyle = data.color;
            ctx.fill();
            remoteLastX = data.x;
            remoteLastY = data.y;
        } else if (data.type === 'move') {
            ctx.beginPath();
            ctx.moveTo(remoteLastX, remoteLastY);
            ctx.lineTo(data.x, data.y);
            ctx.strokeStyle = data.color;
            ctx.lineWidth = data.size;
            ctx.stroke();
            remoteLastX = data.x;
            remoteLastY = data.y;
        }
    });
    
    socket.on('clear-canvas', () => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    });

    // --- Game Logic ---
    
    socket.on('party-joined', (d) => startVoice(d.roomId, myName));

    socket.on('draw-waiting', (data) => {
        document.getElementById('waitingScreen').classList.remove('hidden');
        document.getElementById('gameArea').classList.add('hidden');
        renderPlayers(data.players);
    });

    socket.on('draw-update', (data) => {
        document.getElementById('waitingScreen').classList.add('hidden');
        document.getElementById('gameArea').classList.remove('hidden');
        
        // FIX: Resize canvas now that the container is visible
        setTimeout(resizeCanvas, 50);

        isDrawer = (socket.id === data.drawer?.id);
        
        // UI Toggles
        document.getElementById('toolsBar').style.display = isDrawer ? 'flex' : 'none';
        document.getElementById('guessInput').disabled = isDrawer;
        document.getElementById('guessInput').placeholder = isDrawer ? "You are drawing..." : "Type your guess...";
        
        renderPlayers(data.players, data.drawer?.id);
        
        // Round Info
        const totalTurns = data.maxRounds * data.players.length;
        document.getElementById('roundInfo').innerText = `Round ${Math.ceil(data.round / data.players.length)}/${data.maxRounds}`;
    });

    socket.on('choose-word', (data) => {
        const modal = document.getElementById('wordModal');
        const choices = document.getElementById('wordChoices');
        choices.innerHTML = '';
        data.words.forEach(w => {
            const btn = document.createElement('button');
            btn.className = 'word-btn px-6 py-2 rounded-lg text-xl';
            btn.innerText = w;
            btn.onclick = () => { socket.emit('word-selected', { word: w }); modal.classList.add('hidden'); };
            choices.appendChild(btn);
        });
        modal.classList.remove('hidden');
    });

    socket.on('your-turn', (data) => {
        document.getElementById('wordDisplay').innerText = data.word;
        document.getElementById('wordDisplay').classList.add('text-green-400');
    });

    socket.on('start-guessing', (data) => {
        document.getElementById('wordDisplay').innerText = data.hint;
        document.getElementById('wordDisplay').classList.remove('text-green-400');
    });

    socket.on('update-hint', (data) => {
        document.getElementById('wordDisplay').innerText = data.hint;
    });

    socket.on('timer-sync', (data) => {
        document.getElementById('timerDisplay').innerText = data.time;
    });

    socket.on('draw-chat', (data) => {
        const d = document.createElement('div');
        d.className = `chat-msg ${data.close ? 'close-msg' : ''}`;
        d.innerHTML = `<span class="font-bold text-[var(--primary)]">${data.name}:</span> ${data.msg}`;
        document.getElementById('messages').appendChild(d);
        document.getElementById('chatBox').scrollTop = document.getElementById('chatBox').scrollHeight;
    });

    socket.on('correct-guess', (data) => {
        const d = document.createElement('div');
        d.className = 'chat-msg correct-msg';
        d.innerText = `✅ ${data.name} guessed correctly! (+${data.points})`;
        document.getElementById('messages').appendChild(d);
    });

    socket.on('round-end', (data) => {
        if(data.error) alert(data.error);
        ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear canvas
        document.getElementById('wordDisplay').innerText = `The word was: ${data.word.toUpperCase()}`;
    });

    socket.on('game-over', (data) => {
        const list = document.getElementById('finalScores');
        list.innerHTML = '';
        data.players.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = `flex justify-between p-2 glass rounded ${i === 0 ? 'border border-yellow-400' : ''}`;
            div.innerHTML = `<span>${i === 0 ? '🏆 ' : ''}${p.name}</span><span>${p.score}</span>`;
            list.appendChild(div);
        });
        document.getElementById('gameOverModal').classList.remove('hidden');
    });

    function renderPlayers(players, drawerId) {
        const list = document.getElementById('playerList');
        list.innerHTML = '<h3 class="text-center border-b border-white/10 pb-2 mb-2 font-bold text-[var(--primary)]">PLAYERS</h3>';
        players.sort((a,b) => b.score - a.score).forEach(p => {
            const div = document.createElement('div');
            div.className = `flex justify-between p-2 rounded ${p.id === drawerId ? 'bg-[var(--primary)]/20 border border-[var(--primary)]' : 'bg-white/5'}`;
            div.innerHTML = `<span>${p.name} ${p.id === drawerId ? '✏️' : ''}</span><span class="font-bold">${p.score}</span>`;
            list.appendChild(div);
        });
    }

    function setColor(c) { currentColor = c; }
    function setBrushSize(s) { currentSize = s; }
    function setEraser() { currentColor = '#1a1a1a'; } // Matches canvas background
    function clearBoard() { 
        ctx.clearRect(0, 0, canvas.width, canvas.height); 
        socket.emit('clear-canvas'); 
    }
    
    function sendGuess() {
        const input = document.getElementById('guessInput');
        if(!input.value.trim()) return;
        socket.emit('draw-guess', { name: myName, guess: input.value });
        input.value = '';
    }
  </script>
</body>
</html>
