<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Watch-Night | Think & Draw</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #00f3ff; --secondary: #bc13fe; --bg: #050505; }
    body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; overflow: hidden; }
    
    /* General */
    .glass { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .neon-btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: black; font-weight: bold; transition: all 0.3s; }
    .neon-btn:hover { filter: brightness(1.2); box-shadow: 0 0 20px var(--primary); }
    
    /* Canvas */
    canvas { background: #1a1a1a; border-radius: 8px; cursor: crosshair; touch-action: none; width: 100%; height: 100%; }
    
    .word-btn { background: rgba(255,255,255,0.1); border: 2px solid var(--primary); transition: all 0.2s; }
    .word-btn:hover { background: var(--primary); color: black; transform: scale(1.05); }

    .chat-msg { padding: 4px 8px; border-radius: 8px; margin-bottom: 4px; font-size: 0.9rem; }
    .system-msg { color: var(--secondary); font-style: italic; text-align: center; }
    .close-msg { background: rgba(255, 165, 0, 0.2); color: orange; }
    .correct-msg { background: rgba(0, 255, 0, 0.2); color: #00ff00; font-weight: bold; }

    /* Back Button */
    #backBtn { position: fixed; top: 10px; left: 10px; z-index: 100; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); padding: 6px 10px; border-radius: 8px; display: flex; align-items: center; gap: 5px; text-decoration: none; color: white; font-size: 12px; transition: all 0.3s; }
    #backBtn:hover { background: var(--primary); color: black; }

    /* Mobile Drawers */
    .mobile-drawer { position: fixed; bottom: 0; left: 0; right: 0; height: 60%; background: rgba(5,5,5,0.98); border-top: 2px solid var(--primary); transform: translateY(100%); transition: transform 0.3s ease; z-index: 90; display: flex; flex-direction: column; }
    .mobile-drawer.open { transform: translateY(0); }
    
    /* Toast */
    @keyframes slideIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 99999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast-item { padding: 10px 18px; border-radius: 10px; font-size: 0.875rem; font-weight: 500; backdrop-filter: blur(10px); animation: slideIn 0.4s ease; border-left: 3px solid; pointer-events: auto; }
    .toast-success { background: rgba(0,0,0,0.8); color: #4ade80; border-color: #4ade80; }
    .toast-info { background: rgba(0,0,0,0.8); color: #22d3ee; border-color: #22d3ee; }

    /* Tools */
    .tool-btn { width: 36px; height: 36px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
    .tool-btn.active { border-color: white; transform: scale(1.1); }
  </style>
</head>
<body class="h-[100dvh] w-screen flex flex-col">

  <div class="toast-container" id="toastContainer"></div>

  <a href="/?skipSplash=1" id="backBtn">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
    Lobby
  </a>

  <!-- WORD CHOICE MODAL -->
  <div id="wordModal" class="hidden fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4">
    <div class="glass p-6 rounded-2xl text-center border border-[var(--primary)] w-full max-w-sm">
      <h2 class="text-xl font-bold mb-4" style="font-family:'Orbitron'">Choose a Word</h2>
      <div id="wordChoices" class="flex flex-col gap-3"></div>
    </div>
  </div>

  <!-- GAME OVER MODAL -->
  <div id="gameOverModal" class="hidden fixed inset-0 z-[100] bg-black/90 flex items-center justify-center p-4">
    <div class="glass p-6 rounded-2xl text-center border border-[var(--secondary)] w-full max-w-sm">
      <div class="text-5xl mb-4">&#127942;</div>
      <h2 class="text-2xl font-bold mb-4" style="font-family:'Orbitron'">Game Over!</h2>
      <div id="finalScores" class="space-y-2 mb-4 max-h-40 overflow-y-auto"></div>
      <a href="/?skipSplash=1" class="neon-btn px-6 py-2 rounded-lg inline-block text-sm">Back to Lobby</a>
    </div>
  </div>

  <!-- WAITING SCREEN -->
  <div id="waitingScreen" class="hidden h-full w-full flex flex-col items-center justify-center p-4">
     <div class="text-5xl mb-4">&#127912;</div>
     <h2 class="text-xl font-bold text-gray-300">Waiting for Players...</h2>
     <p class="text-gray-500 mt-2 text-sm text-center">Need at least 2 players to start</p>
  </div>

  <!-- MAIN GAME UI -->
  <!-- flex-1 min-h-0 is CRITICAL for canvas to fit properly -->
  <div id="gameArea" class="hidden flex-1 min-h-0 flex flex-col md:flex-row p-2 gap-2">
    
    <!-- DESKTOP: Left Sidebar (Players) -->
    <div class="hidden md:flex w-48 flex-col glass rounded-xl p-2 overflow-y-auto gap-1" id="playerListDesktop"></div>

    <!-- Center: Canvas & Controls -->
    <div class="flex-1 min-w-0 min-h-0 flex flex-col gap-2">
        
        <!-- Top Bar -->
        <div class="glass rounded-xl p-2 flex items-center justify-between flex-shrink-0">
            <div class="text-xl font-bold font-mono text-[var(--primary)] w-12 text-center" id="timerDisplay">60</div>
            <div class="flex-1 text-center px-2">
                <div id="wordDisplay" class="text-xl md:text-2xl tracking-[0.2em] font-bold truncate">_ _ _ _</div>
                <div class="text-[10px] text-gray-400" id="roundInfo">Round 1/3</div>
            </div>
            <!-- Mobile Menu Buttons -->
            <div class="flex md:hidden gap-1">
                <button onclick="toggleDrawer('players')" class="control-btn p-2 rounded">&#128100;</button>
                <button onclick="toggleDrawer('chat')" class="control-btn p-2 rounded">&#128172;</button>
            </div>
            <div class="hidden md:block w-12"></div>
        </div>

        <!-- Canvas Container -->
        <div class="flex-1 min-h-0 relative bg-black rounded-xl overflow-hidden shadow-lg border border-white/10" id="canvasContainer">
            <canvas id="drawCanvas"></canvas>
        </div>

        <!-- Tools (Visible only to Drawer) -->
        <div id="toolsBar" class="hidden glass rounded-xl p-2 flex items-center justify-center gap-2 flex-wrap flex-shrink-0">
            <!-- Colors -->
            <div class="flex gap-1">
                <button onclick="setColor('#ffffff')" class="tool-btn bg-white"></button>
                <button onclick="setColor('#ff0000')" class="tool-btn bg-red-500"></button>
                <button onclick="setColor('#00ff00')" class="tool-btn bg-green-500"></button>
                <button onclick="setColor('#0000ff')" class="tool-btn bg-blue-500"></button>
                <button onclick="setColor('#ffff00')" class="tool-btn bg-yellow-400"></button>
                <button onclick="setColor('#000000')" class="tool-btn bg-black border border-white/50"></button>
            </div>
            <!-- Size & Actions -->
            <input type="range" id="brushSize" min="2" max="30" value="5" class="w-16 md:w-24" onchange="setBrushSize(this.value)">
            <button onclick="setEraser()" class="control-btn px-2 py-1 rounded text-xs">Eraser</button>
            <button onclick="clearBoard()" class="control-btn px-2 py-1 rounded text-xs bg-red-500/20 border-red-500 hover:bg-red-500 hover:text-white">Clear</button>
        </div>
    </div>

    <!-- DESKTOP: Right Sidebar (Chat) -->
    <div class="hidden md:flex w-64 flex-col glass rounded-xl overflow-hidden">
        <div class="p-2 border-b border-white/10 text-xs text-center text-gray-400">CHAT</div>
        <div id="chatBoxDesktop" class="flex-1 p-2 overflow-y-auto flex flex-col-reverse text-sm"></div>
        <div class="p-2 border-t border-white/10">
            <input type="text" id="guessInputDesktop" placeholder="Type guess..." class="w-full bg-black/50 border border-white/10 rounded p-1 text-sm focus:outline-none focus:border-[var(--primary)]" onkeypress="if(event.key==='Enter')sendGuess(this)">
        </div>
    </div>
  </div>

  <!-- MOBILE DRAWERS -->
  
  <!-- Players Drawer -->
  <div id="playerDrawer" class="mobile-drawer">
      <div class="flex justify-between items-center p-3 border-b border-white/10">
          <h3 class="font-bold text-[var(--primary)]">Players</h3>
          <button onclick="toggleDrawer('players')" class="text-2xl">&times;</button>
      </div>
      <div id="playerListMobile" class="flex-1 p-3 overflow-y-auto"></div>
  </div>

  <!-- Chat Drawer -->
  <div id="chatDrawer" class="mobile-drawer">
      <div class="flex justify-between items-center p-3 border-b border-white/10">
          <h3 class="font-bold text-[var(--primary)]">Chat / Guesses</h3>
          <button onclick="toggleDrawer('chat')" class="text-2xl">&times;</button>
      </div>
      <div id="chatBoxMobile" class="flex-1 p-3 overflow-y-auto flex flex-col-reverse"></div>
      <div class="p-2 border-t border-white/10">
          <input type="text" id="guessInputMobile" placeholder="Type guess..." class="w-full bg-black/50 border border-white/10 rounded p-2 text-sm focus:outline-none focus:border-[var(--primary)]" onkeypress="if(event.key==='Enter')sendGuess(this)">
      </div>
  </div>


  <script src="/socket.io/socket.io.js"></script>
  <script src="/voice-manager.js"></script>
  <script>
    const socket = io();
    let myName = localStorage.getItem('watchNightName');
    let partyCode = localStorage.getItem('partyCode');
    let isDrawer = false;
    let currentColor = '#ffffff';
    let currentSize = 5;
    let lastX = 0;
    let lastY = 0;
    let isDrawing = false;

    /* ── Toast System ── */
    function showToast(message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = `toast-item toast-${type}`;
      toast.innerHTML = `<div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full ${type==='success'?'bg-green-400':type==='error'?'bg-red-400':'bg-cyan-400'}"></span>${message}</div>`;
      container.appendChild(toast);
      setTimeout(() => { toast.style.transition = 'all 0.4s ease'; toast.style.opacity = '0'; toast.style.transform = 'translateX(100px)'; setTimeout(() => toast.remove(), 400); }, 3000);
    }

    /* ── Drawer Toggle ── */
    function toggleDrawer(type) {
        const pDrawer = document.getElementById('playerDrawer');
        const cDrawer = document.getElementById('chatDrawer');
        if(type === 'players') {
            cDrawer.classList.remove('open');
            pDrawer.classList.toggle('open');
        } else {
            pDrawer.classList.remove('open');
            cDrawer.classList.toggle('open');
        }
    }

    window.onload = () => {
        if(!partyCode) window.location.href = '/';
        initVoiceSystem(socket);
        
        // Resize handling
        window.addEventListener('resize', resizeCanvas);
        // Initial resize after a short delay to ensure layout is ready
        setTimeout(resizeCanvas, 100);

        socket.emit('join-party', { roomId: partyCode, name: myName, uid: localStorage.getItem('watchNightUid') });
        socket.emit('join-draw-room', { roomId: partyCode, name: myName });
    };

    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        const container = document.getElementById('canvasContainer');
        if(!container || container.offsetParent === null) return;
        
        // Save current state
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = canvas.width; tempCanvas.height = canvas.height;
        tempCanvas.getContext('2d').drawImage(canvas, 0, 0);

        // Resize
        canvas.width = container.clientWidth;
        canvas.height = container.clientHeight;
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        // Restore state
        ctx.drawImage(tempCanvas, 0, 0);
    }

    // --- Drawing Events ---
    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseout', stopDrawing);
    
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); const touch = e.touches[0]; const mouseEvent = new MouseEvent('mousedown', { clientX: touch.clientX, clientY: touch.clientY }); canvas.dispatchEvent(mouseEvent); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); const touch = e.touches[0]; const mouseEvent = new MouseEvent('mousemove', { clientX: touch.clientX, clientY: touch.clientY }); canvas.dispatchEvent(mouseEvent); });
    canvas.addEventListener('touchend', () => { const mouseEvent = new MouseEvent('mouseup', {}); canvas.dispatchEvent(mouseEvent); });

    function startDrawing(e) {
        if(!isDrawer) return;
        isDrawing = true;
        [lastX, lastY] = getPos(e);
        ctx.beginPath();
        ctx.arc(lastX, lastY, currentSize/2, 0, Math.PI*2);
        ctx.fillStyle = currentColor;
        ctx.fill();
        socket.emit('draw-stroke', { type: 'start', x: lastX, y: lastY, color: currentColor, size: currentSize });
    }

    function draw(e) {
        if(!isDrawing || !isDrawer) return;
        const [x, y] = getPos(e);
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(x, y);
        ctx.strokeStyle = currentColor;
        ctx.lineWidth = currentSize;
        ctx.stroke();
        socket.emit('draw-stroke', { type: 'move', x, y, color: currentColor, size: currentSize });
        [lastX, lastY] = [x, y];
    }

    function stopDrawing() { isDrawing = false; }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);
        return [x, y];
    }

    let remoteLastX = 0;
    let remoteLastY = 0;

    socket.on('draw-stroke', (data) => {
        if(data.type === 'start') {
            ctx.beginPath();
            ctx.arc(data.x, data.y, data.size/2, 0, Math.PI*2);
            ctx.fillStyle = data.color;
            ctx.fill();
            remoteLastX = data.x; remoteLastY = data.y;
        } else if (data.type === 'move') {
            ctx.beginPath();
            ctx.moveTo(remoteLastX, remoteLastY);
            ctx.lineTo(data.x, data.y);
            ctx.strokeStyle = data.color;
            ctx.lineWidth = data.size;
            ctx.stroke();
            remoteLastX = data.x; remoteLastY = data.y;
        }
    });
    
    socket.on('clear-canvas', () => { ctx.clearRect(0, 0, canvas.width, canvas.height); });

    socket.on('party-joined', (d) => startVoice(d.roomId, myName));
    
    socket.on('user-joined-msg', (data) => showToast(`${data.name} joined`, 'success'));
    socket.on('user-left-msg', (data) => showToast(`${data.name} left`, 'info'));

    socket.on('draw-waiting', (data) => {
        document.getElementById('waitingScreen').classList.remove('hidden');
        document.getElementById('gameArea').classList.add('hidden');
        renderPlayers(data.players);
    });

    socket.on('draw-update', (data) => {
        document.getElementById('waitingScreen').classList.add('hidden');
        document.getElementById('gameArea').classList.remove('hidden');
        
        // Resize canvas once visible
        setTimeout(resizeCanvas, 50);

        isDrawer = (socket.id === data.drawer?.id);
        
        // Show/Hide Tools
        document.getElementById('toolsBar').classList.toggle('hidden', !isDrawer);
        document.getElementById('toolsBar').style.display = isDrawer ? 'flex' : 'none';
        
        // Update inputs state
        document.getElementById('guessInputDesktop').disabled = isDrawer;
        document.getElementById('guessInputMobile').disabled = isDrawer;
        document.getElementById('guessInputDesktop').placeholder = isDrawer ? "You are drawing..." : "Type guess...";
        document.getElementById('guessInputMobile').placeholder = isDrawer ? "You are drawing..." : "Type guess...";

        renderPlayers(data.players, data.drawer?.id);
        const totalTurns = data.maxRounds * data.players.length;
        document.getElementById('roundInfo').innerText = `Round ${Math.ceil(data.round / data.players.length)}/${data.maxRounds}`;
    });

    socket.on('choose-word', (data) => {
        const modal = document.getElementById('wordModal');
        const choices = document.getElementById('wordChoices');
        choices.innerHTML = '';
        data.words.forEach(w => {
            const btn = document.createElement('button');
            btn.className = 'word-btn px-6 py-2 rounded-lg text-lg';
            btn.innerText = w;
            btn.onclick = () => { socket.emit('word-selected', { word: w }); modal.classList.add('hidden'); };
            choices.appendChild(btn);
        });
        modal.classList.remove('hidden');
    });

    socket.on('your-turn', (data) => {
        document.getElementById('wordDisplay').innerText = data.word;
        document.getElementById('wordDisplay').classList.add('text-green-400');
    });

    socket.on('start-guessing', (data) => {
        document.getElementById('wordDisplay').innerText = data.hint;
        document.getElementById('wordDisplay').classList.remove('text-green-400');
    });

    socket.on('update-hint', (data) => { document.getElementById('wordDisplay').innerText = data.hint; });
    socket.on('timer-sync', (data) => { document.getElementById('timerDisplay').innerText = data.time; });

    socket.on('draw-chat', (data) => {
        const d = document.createElement('div');
        d.className = `chat-msg ${data.close ? 'close-msg' : ''}`;
        d.innerHTML = `<span class="font-bold text-[var(--primary)]">${data.name}:</span> ${data.msg}`;
        
        // Append to both mobile and desktop
        document.getElementById('chatBoxMobile').appendChild(d.cloneNode(true));
        document.getElementById('chatBoxDesktop').appendChild(d);
    });

    socket.on('correct-guess', (data) => {
        const d = document.createElement('div');
        d.className = 'chat-msg correct-msg';
        d.innerText = `✅ ${data.name} guessed correctly! (+${data.points})`;
        document.getElementById('chatBoxMobile').appendChild(d.cloneNode(true));
        document.getElementById('chatBoxDesktop').appendChild(d);
        showToast(`${data.name} guessed the word!`, 'success');
    });

    socket.on('round-end', (data) => {
        if(data.error) showToast(data.error, 'error');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.getElementById('wordDisplay').innerText = `The word was: ${data.word.toUpperCase()}`;
    });

    socket.on('game-over', (data) => {
        const list = document.getElementById('finalScores');
        list.innerHTML = '';
        data.players.forEach((p, i) => {
            const div = document.createElement('div');
            div.className = `flex justify-between p-2 glass rounded ${i === 0 ? 'border border-yellow-400' : ''}`;
            div.innerHTML = `<span>${i === 0 ? '🏆 ' : ''}${p.name}</span><span>${p.score}</span>`;
            list.appendChild(div);
        });
        document.getElementById('gameOverModal').classList.remove('hidden');
    });

    function renderPlayers(players, drawerId) {
        const listDesktop = document.getElementById('playerListDesktop');
        const listMobile = document.getElementById('playerListMobile');
        
        const html = players.sort((a,b) => b.score - a.score).map(p => 
            `<div class="flex justify-between p-2 rounded ${p.id === drawerId ? 'bg-[var(--primary)]/20 border border-[var(--primary)]' : 'bg-white/5'}">
                <span class="truncate">${p.name} ${p.id === drawerId ? '✏️' : ''}</span>
                <span class="font-bold ml-2">${p.score}</span>
            </div>`
        ).join('');
        
        listDesktop.innerHTML = html;
        listMobile.innerHTML = html;
    }

    function setColor(c) { currentColor = c; }
    function setBrushSize(s) { currentSize = s; }
    function setEraser() { currentColor = '#1a1a1a'; }
    function clearBoard() { 
        ctx.clearRect(0, 0, canvas.width, canvas.height); 
        socket.emit('clear-canvas'); 
    }
    
    function sendGuess(inputElement) {
        const val = inputElement.value.trim();
        if(!val) return;
        socket.emit('draw-guess', { name: myName, guess: val });
        inputElement.value = '';
        // Sync inputs
        document.getElementById('guessInputDesktop').value = '';
        document.getElementById('guessInputMobile').value = '';
    }
  </script>
</body>
</html>
