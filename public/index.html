<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch-Night | Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #00f3ff; --secondary: #bc13fe; --bg: #050505; }
    body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }
    
    /* Gate Styles */
    #nameGate { position: fixed; inset: 0; z-index: 99999; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.5s ease; }
    #nameGate.show { opacity: 1; visibility: visible; }
    .gate-box { background: rgba(10, 10, 10, 0.95); border: 2px solid var(--primary); padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 50px rgba(0, 243, 255, 0.2); transform: scale(0.9); transition: transform 0.3s; }
    #nameGate.show .gate-box { transform: scale(1); }
    
    /* Splash & Animations */
    @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes bgPan { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
    
    #splash-screen { position: fixed; inset: 0; z-index: 9998; background: radial-gradient(circle at center, #0a0a12 0%, #000000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 1s ease, visibility 1s ease; overflow: hidden; }
    #splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    
    .splash-bg-effect { position: absolute; width: 150%; height: 150%; background: radial-gradient(circle, transparent 0%, #000 80%), linear-gradient(0deg, transparent 24%, var(--primary) 25%, var(--primary) 26%, transparent 27%, transparent 74%, var(--primary) 75%, var(--primary) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, var(--primary) 25%, var(--primary) 26%, transparent 27%, transparent 74%, var(--primary) 75%, var(--primary) 76%, transparent 77%, transparent); background-size: 100% 100%, 50px 50px, 50px 50px; opacity: 0.05; z-index: 0; animation: bgPan 10s linear infinite; }
    
    .glass { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .neon-btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: black; font-weight: bold; transition: all 0.3s; border: none; }
    .neon-btn:hover { filter: brightness(1.2); box-shadow: 0 0 20px var(--primary); transform: translateY(-2px); }
    .outline-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; transition: all 0.3s; }
    .input-futuristic { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.1); color: white; transition: all 0.3s; }
    .input-futuristic:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 243, 255, 0.2); }
    .anim-fade-in { animation: fadeInUp 0.6s ease forwards; opacity: 0; }

    #globalVoiceBar { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: rgba(10, 10, 10, 0.95); border-top: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; gap: 20px; padding: 0 20px; z-index: 100; backdrop-filter: blur(10px); transform: translateY(100%); transition: transform 0.3s; }
    #globalVoiceBar.active { transform: translateY(0); }
    .voice-user { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; padding: 4px 12px; background: rgba(255,255,255,0.05); border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
  </style>
</head>
<body>

  <!-- 1. SPLASH SCREEN -->
  <div id="splash-screen">
    <div class="splash-bg-effect"></div>
    <div class="text-lg tracking-widest text-gray-400 uppercase anim-fade-in" style="animation-delay: 0.2s">Welcome to</div>
    <div class="text-5xl sm:text-6xl md:text-8xl font-black text-white my-4 text-center leading-tight anim-fade-in" style="font-family: 'Orbitron'; animation-delay: 0.4s">WATCH<br><span class="text-[var(--primary)]">NIGHT</span></div>
    <div class="text-xl sm:text-2xl md:text-3xl font-bold text-gray-300 mt-8 anim-fade-in text-center px-4" style="animation-delay: 0.6s">
      Made with <span class="text-red-500 text-2xl sm:text-3xl">❤</span> by <span class="text-[var(--primary)]">Nikhil (Nixton)</span>
    </div>
  </div>

  <!-- 2. NAME GATE -->
  <div id="nameGate">
    <div class="gate-box">
      <h1 class="text-3xl font-bold text-white mb-2" style="font-family: 'Orbitron'">Identify Yourself</h1>
      <p class="text-gray-400 mb-6 text-sm">Enter your name to continue</p>
      <input type="text" id="gateNameInput" placeholder="Your Name..." class="input-futuristic rounded-lg p-3 text-xl text-center w-64 mb-4" autofocus>
      <button onclick="enterHub()" class="neon-btn px-8 py-3 rounded-lg text-lg w-full">Enter Hub</button>
    </div>
  </div>

  <!-- 3. MAIN HUB -->
  <div id="mainHub" class="min-h-screen w-screen flex flex-col items-center justify-center p-6 pb-24 opacity-0 transition-opacity duration-1000">
    <div class="absolute top-4 right-4 flex items-center gap-3">
      <span id="headerName" class="text-sm text-gray-400"></span>
      <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-[var(--primary)] to-[var(--secondary)] flex items-center justify-center font-bold text-black text-xs" id="headerAvatar">?</div>
    </div>

    <div class="w-full max-w-lg">
      <div class="glass rounded-2xl p-8 border border-white/10 flex flex-col items-center text-center anim-fade-in">
        <div class="text-6xl mb-4">🚀</div>
        <h2 class="text-3xl font-bold mb-2" style="font-family: 'Orbitron'">Create or Join</h2>
        <p class="text-gray-400 text-sm mb-8">Start a room to Watch, Play, and Chat together.</p>

        <div class="w-full space-y-4">
          <button onclick="createRoom()" class="w-full neon-btn py-4 rounded-xl text-xl">Create New Room</button>
          <div class="flex items-center gap-2 w-full">
            <div class="flex-1 h-px bg-white/10"></div>
            <span class="text-gray-500 text-xs">OR</span>
            <div class="flex-1 h-px bg-white/10"></div>
          </div>
          <div class="flex gap-2">
            <input type="text" id="joinCodeInput" placeholder="Enter Code" class="flex-1 input-futuristic rounded-xl p-3 uppercase text-center text-lg tracking-widest">
            <button onclick="joinRoom()" class="outline-btn px-6 rounded-xl font-bold text-lg">Join</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 4. GLOBAL VOICE BAR -->
  <div id="globalVoiceBar">
    <div class="flex items-center gap-2 text-gray-400"><span class="animate-pulse">🔵</span> Global Lobby</div>
    <div id="lobbyUsers" class="flex gap-3 flex-1 overflow-x-auto px-4"></div>
    <button onclick="toggleMic()" id="micBtn" class="outline-btn px-4 py-2 rounded-lg text-sm">🎤</button>
  </div>

  <script>
    const socket = io();
    let myData = { name: '', uid: '' };
    let myStream;
    let isMicOn = false;
    const peers = {}; 

    window.onload = () => {
      const savedName = localStorage.getItem('watchNightName');
      if(savedName) document.getElementById('gateNameInput').value = savedName;
      setTimeout(() => {
        document.getElementById('splash-screen').classList.add('hidden');
        setTimeout(() => { document.getElementById('nameGate').classList.add('show'); }, 1000);
      }, 3500);
    };

    function enterHub() {
      const val = document.getElementById('gateNameInput').value.trim();
      if (!val) return alert("Name is required");
      myData.name = val;
      myData.uid = localStorage.getItem('watchNightUid') || Math.random().toString(36).substring(2, 10);
      localStorage.setItem('watchNightName', myData.name);
      localStorage.setItem('watchNightUid', myData.uid);
      document.getElementById('nameGate').classList.remove('show');
      setTimeout(() => {
        document.getElementById('mainHub').style.opacity = '1';
        document.getElementById('headerName').innerText = myData.name;
        document.getElementById('headerAvatar').innerText = myData.name.charAt(0).toUpperCase();
        initGlobalVoice();
      }, 300);
    }

    async function initGlobalVoice() {
      try { myStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false }); isMicOn = true; updateMicUI(); socket.emit('join-lobby', { name: myData.name, uid: myData.uid }); document.getElementById('globalVoiceBar').classList.add('active'); } catch(e) { console.log("Mic denied"); }
    }
    function toggleMic() { isMicOn = !isMicOn; if(myStream) myStream.getAudioTracks()[0].enabled = isMicOn; updateMicUI(); }
    function updateMicUI() { const btn = document.getElementById('micBtn'); btn.innerText = isMicOn ? '🎤' : '🔇'; btn.classList.toggle('neon-btn', isMicOn); }

    function createPeerConnection(userId) {
      if (peers[userId]) return;
      const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      peers[userId] = pc;
      if (myStream) myStream.getTracks().forEach(track => pc.addTrack(track, myStream));
      pc.ontrack = (event) => { let audio = document.getElementById(`audio-${userId}`); if (!audio) { audio = document.createElement('audio'); audio.id = `audio-${userId}`; audio.autoplay = true; document.body.appendChild(audio); } audio.srcObject = event.streams[0]; };
      pc.onicecandidate = (e) => { if (e.candidate) socket.emit('signal', { to: userId, signal: e.candidate }); };
      pc.onnegotiationneeded = async () => { try { const offer = await pc.createOffer(); await pc.setLocalDescription(offer); socket.emit('signal', { to: userId, signal: offer }); } catch (err) { console.error(err); } };
    }

    socket.on('lobby-users', (users) => { const container = document.getElementById('lobbyUsers'); container.innerHTML = ''; users.forEach(u => { if (u.uid === myData.uid) return; const div = document.createElement('div'); div.className = 'voice-user'; div.innerHTML = `<span>🔊</span> ${u.name}`; container.appendChild(div); createPeerConnection(u.id); }); });
    socket.on('signal', async (data) => { if (!peers[data.from]) createPeerConnection(data.from); const pc = peers[data.from]; try { if (data.signal.type === 'offer') { await pc.setRemoteDescription(new RTCSessionDescription(data.signal)); const answer = await pc.createAnswer(); await pc.setLocalDescription(answer); socket.emit('signal', { to: data.from, signal: answer }); } else if (data.signal.type === 'answer') { await pc.setRemoteDescription(new RTCSessionDescription(data.signal)); } else if (data.signal.candidate) { await pc.addIceCandidate(new RTCIceCandidate(data.signal)); } } catch (err) { console.error(err); } });
    socket.on('user-disconnected', (id) => { if (peers[id]) { peers[id].close(); delete peers[id]; } const audioEl = document.getElementById(`audio-${id}`); if (audioEl) audioEl.remove(); });

    function generateUID() { return Math.random().toString(36).substring(2, 8).toUpperCase(); }
    function createRoom() { const roomId = generateUID(); goToRoom(roomId, true); }
    function joinRoom() { const code = document.getElementById('joinCodeInput').value.toUpperCase(); if (!code) return alert("Please enter a code"); goToRoom(code, false); }
    function goToRoom(roomId, isHost) { window.location.href = `/room?room=${roomId}&host=${isHost}`; }
  </script>
</body>
</html>
