<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Watch-Night | Game Zone</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #00f3ff; --secondary: #bc13fe; --bg: #050505; }
    body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; overflow: hidden; }
    
    @keyframes fadeIn { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes glowPulse { 0% { box-shadow: 0 0 20px var(--primary); } 50% { box-shadow: 0 0 40px var(--primary), 0 0 60px var(--secondary); } 100% { box-shadow: 0 0 20px var(--primary); } }

    .glass { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .neon-btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: black; font-weight: bold; transition: all 0.3s; border: none; }
    .neon-btn:hover { filter: brightness(1.2); box-shadow: 0 0 20px var(--primary); transform: translateY(-2px); }
    
    .outline-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; transition: all 0.3s; }
    .outline-btn:hover { border-color: var(--primary); color: var(--primary); background: rgba(0, 243, 255, 0.05); }

    .input-futuristic { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.1); color: white; transition: all 0.3s; }
    .input-futuristic:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }

    .anim-fade-in { animation: fadeIn 0.5s ease forwards; }
    
    /* Game Specific */
    .ttt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 260px; height: 260px; }
    .ttt-cell { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; font-size: 3.5rem; transition: all 0.2s; }
    .ttt-cell:hover { background: rgba(255,255,255,0.1); cursor: pointer; }
    .ttt-cell.x { color: var(--primary); text-shadow: 0 0 20px var(--primary); }
    .ttt-cell.o { color: var(--secondary); text-shadow: 0 0 20px var(--secondary); }
    .ttt-cell.win { animation: glowPulse 1s infinite; background: rgba(255,255,255,0.1); }
    
    .reflex-box { transition: background 0.2s; }
    .reflex-go { background: rgba(0, 243, 255, 0.4) !important; border-color: white !important; }
    .reflex-wait { background: rgba(188, 19, 254, 0.1) !important; }
  </style>
</head>
<body class="h-screen w-screen flex flex-col">

  <!-- LOBBY SCREEN -->
  <div id="lobbyScreen" class="h-full w-full flex flex-col items-center justify-center p-6">
    <div class="glass p-8 rounded-2xl w-full max-w-md space-y-6 border-l-4 border-l-[var(--primary)] relative overflow-hidden anim-fade-in">
      <div class="text-center">
        <h1 class="text-4xl font-bold mb-2" style="font-family: 'Orbitron'">GAME ZONE</h1>
        <p class="text-gray-500 text-sm">Play with friends online</p>
      </div>
      
      <div class="space-y-4">
        <input type="text" id="usernameInput" placeholder="Enter Your Name" class="w-full input-futuristic rounded-lg p-3 text-lg">
        
        <div class="flex gap-2">
          <button onclick="handleCreate()" class="flex-1 neon-btn py-3 rounded-lg text-lg">Create Room</button>
          <button onclick="showJoinInput()" class="flex-1 outline-btn font-bold py-3 rounded-lg">Join Room</button>
        </div>
        <div id="joinContainer" class="hidden space-y-2">
          <input type="text" id="roomCodeInput" placeholder="Enter Room Code" class="w-full input-futuristic rounded-lg p-3 uppercase tracking-widest text-center">
          <button onclick="handleJoin()" class="w-full neon-btn py-3 rounded-lg text-lg">Connect</button>
        </div>
      </div>
      <a href="/" class="block text-center text-gray-500 hover:text-white text-xs mt-4">← Back to Hub</a>
    </div>
  </div>

  <!-- WAITING SCREEN -->
  <div id="waitingScreen" class="hidden h-full w-full flex flex-col items-center justify-center p-6">
    <div class="text-center anim-fade-in">
      <h2 class="text-3xl font-bold mb-4" style="font-family: 'Orbitron'">Waiting for Opponent</h2>
      <div class="w-16 h-16 border-4 border-t-[var(--primary)] border-r-transparent border-b-transparent border-l-transparent rounded-full animate-spin mx-auto mb-6"></div>
      <p class="text-gray-400 text-sm mb-2">Share this code:</p>
      <div id="roomCodeDisplay" class="text-4xl font-bold tracking-widest text-[var(--primary)]" style="font-family: 'Orbitron'">------</div>
    </div>
  </div>

  <!-- GAME ARENA -->
  <div id="gameArena" class="hidden h-full w-full flex flex-col">
    <!-- Header -->
    <header class="glass p-3 border-b border-white/10 flex justify-between items-center">
      <div id="p1Info" class="flex items-center gap-2">
        <span class="text-xs opacity-50">YOU</span>
        <span id="myName" class="font-bold text-[var(--primary)]">Player</span>
      </div>
      <div class="text-center">
        <span id="turnIndicator" class="text-xs bg-black/50 px-2 py-1 rounded">Waiting...</span>
      </div>
      <div id="p2Info" class="flex items-center gap-2">
        <span id="oppName" class="font-bold text-[var(--secondary)]">Opponent</span>
        <span class="text-xs opacity-50">ENEMY</span>
      </div>
    </header>

    <!-- Game Content -->
    <main id="gameContent" class="flex-1 flex flex-col items-center justify-center p-4">
      <!-- Dynamic Game Content Injected Here -->
    </main>
    
    <!-- Footer -->
    <footer class="p-4 text-center">
      <button onclick="leaveGame()" class="text-gray-500 hover:text-red-500 text-xs uppercase tracking-widest">Leave Room</button>
    </footer>
  </div>

  <script>
    const socket = io();
    let myData = { name: '', symbol: '', id: '' };
    let currentRoom = null;

    // --- LOBBY LOGIC ---
    function showJoinInput() { document.getElementById('joinContainer').classList.toggle('hidden'); }

    function handleCreate() {
      const name = document.getElementById('usernameInput').value || 'Player';
      myData.name = name;
      socket.emit('create-game-room', { name });
    }

    function handleJoin() {
      const name = document.getElementById('usernameInput').value || 'Player';
      const roomId = document.getElementById('roomCodeInput').value.toUpperCase();
      if(!roomId) return;
      myData.name = name;
      socket.emit('join-game-room', { roomId, name });
    }

    socket.on('game-room-created', (data) => {
      currentRoom = data.roomId;
      myData.symbol = 'X';
      document.getElementById('lobbyScreen').classList.add('hidden');
      document.getElementById('waitingScreen').classList.remove('hidden');
      document.getElementById('roomCodeDisplay').innerText = data.roomId;
    });

    socket.on('game-room-joined', (data) => {
      currentRoom = data.roomId;
      myData.symbol = 'O';
    });

    socket.on('game-error', (msg) => {
      alert(msg);
    });

    // --- GAME START ---
    socket.on('game-start', (data) => {
      document.getElementById('lobbyScreen').classList.add('hidden');
      document.getElementById('waitingScreen').classList.add('hidden');
      document.getElementById('gameArena').classList.remove('hidden');
      
      // Setup Header
      const me = data.players.find(p => p.symbol === myData.symbol);
      const opponent = data.players.find(p => p.symbol !== myData.symbol);
      
      document.getElementById('myName').innerText = me.name;
      document.getElementById('oppName').innerText = opponent.name;
      
      // Show Game Selection (Only Host/X chooses)
      if(myData.symbol === 'X') {
        showGameSelection();
      } else {
        document.getElementById('gameContent').innerHTML = `
          <div class="text-center">
            <div class="text-4xl mb-4 animate-pulse">⏳</div>
            <p class="text-gray-400">Waiting for Host to pick a game...</p>
          </div>
        `;
      }
    });

    function showGameSelection() {
      const html = `
        <div class="text-center anim-fade-in">
          <h3 class="text-2xl font-bold mb-6">Pick a Game</h3>
          <div class="flex flex-col gap-4 w-64">
            <button onclick="selectGame('tictactoe')" class="neon-btn py-4 rounded-xl text-xl">⭕ Tic Tac Toe</button>
            <button onclick="selectGame('reflex')" class="neon-btn py-4 rounded-xl text-xl">⚡ Reflex Duel</button>
          </div>
        </div>
      `;
      document.getElementById('gameContent').innerHTML = html;
    }

    function selectGame(type) {
      socket.emit('select-game', { type, roomId: currentRoom });
    }

    socket.on('game-selected', (type) => {
      if(type === 'tictactoe') initTTT();
      if(type === 'reflex') initReflex();
    });

    function leaveGame() {
      window.location.reload();
    }

    // --- TIC TAC TOE ---
    let tttBoard = Array(9).fill(null);
    
    function initTTT() {
      tttBoard = Array(9).fill(null);
      renderTTT();
    }

    function renderTTT(turn = 'X', winnerInfo = null) {
      const isMyTurn = turn === myData.symbol;
      document.getElementById('turnIndicator').innerText = isMyTurn ? "Your Turn!" : "Opponent's Turn";
      document.getElementById('turnIndicator').className = `text-xs px-2 py-1 rounded ${isMyTurn ? 'bg-[var(--primary)] text-black font-bold' : 'bg-black/50'}`;

      let html = `<div class="ttt-grid">`;
      tttBoard.forEach((cell, i) => {
        const isWinning = winnerInfo && winnerInfo.includes(i);
        const canClick = !cell && isMyTurn && !winnerInfo;
        html += `
          <div class="ttt-cell ${cell === 'X' ? 'x' : 'o'} ${isWinning ? 'win' : ''}" 
               onclick="${canClick ? `sendTTTMove(${i})` : ''}">
            ${cell || ''}
          </div>
        `;
      });
      html += `</div>`;
      
      if(winnerInfo) {
        const won = winnerInfo === 'draw' ? false : (tttBoard[winnerInfo[0]] === myData.symbol);
        html += `
          <div class="mt-6 text-center">
            <h3 class="text-2xl font-bold ${winnerInfo === 'draw' ? 'text-gray-400' : (won ? 'text-green-400' : 'text-red-400')}">
              ${winnerInfo === 'draw' ? 'Draw!' : (won ? 'You Win!' : 'You Lose!')}
            </h3>
            <button onclick="selectGame('tictactoe')" class="mt-4 neon-btn px-6 py-2 rounded-lg">Play Again</button>
          </div>
        `;
      }
      
      document.getElementById('gameContent').innerHTML = html;
    }

    function sendTTTMove(index) {
      socket.emit('ttt-move', { index, roomId: currentRoom });
    }

    socket.on('ttt-update', (data) => {
      tttBoard = data.board;
      renderTTT(data.turn, data.line || data.winner);
    });

    // --- REFLEX DUEL ---
    function initReflex() {
      const html = `
        <div class="flex flex-col items-center justify-center h-full w-full anim-fade-in">
          <div id="reflexBox" class="w-64 h-64 glass border-2 border-white/20 rounded-2xl flex items-center justify-center flex-col cursor-pointer reflex-wait">
            <p class="text-2xl font-bold">WAIT</p>
          </div>
          <button id="reflexStartBtn" onclick="startReflexRound()" class="neon-btn px-8 py-3 rounded-xl text-xl mt-6">Start Round</button>
          <p id="reflexMsg" class="h-6 mt-4 text-lg font-bold text-gray-400"></p>
        </div>
      `;
      document.getElementById('gameContent').innerHTML = html;
    }

    function startReflexRound() {
      document.getElementById('reflexStartBtn').style.display = 'none';
      document.getElementById('reflexMsg').innerText = "Wait for GREEN...";
      socket.emit('start-reflex-round', { roomId: currentRoom });
    }

    socket.on('reflex-state', (data) => {
      const box = document.getElementById('reflexBox');
      const msg = document.getElementById('reflexMsg');
      
      if(data.status === 'waiting') {
        box.className = "w-64 h-64 glass border-2 border-white/20 rounded-2xl flex items-center justify-center flex-col cursor-pointer reflex-wait";
        box.innerHTML = `<p class="text-2xl font-bold text-[var(--secondary)]">WAIT</p>`;
        box.onclick = () => sendReflexTap(); // Handle early tap locally? No, let server handle logic but visually allow tap
      } else if(data.status === 'go') {
        box.className = "w-64 h-64 glass border-2 border-white rounded-2xl flex items-center justify-center flex-col cursor-pointer reflex-go";
        box.innerHTML = `<p class="text-2xl font-bold text-black">GO!</p>`;
        msg.innerText = "TAP NOW!";
        msg.className = "h-6 mt-4 text-lg font-bold text-green-400";
      }
    });

    function sendReflexTap() {
      socket.emit('reflex-tap', { roomId: currentRoom });
    }

    socket.on('reflex-result', (data) => {
      const box = document.getElementById('reflexBox');
      const msg = document.getElementById('reflexMsg');
      const btn = document.getElementById('reflexStartBtn');
      
      box.onclick = null; // Disable further taps
      
      if(data.reason === 'early') {
        msg.innerText = "Too Early! You lose.";
        msg.className = "h-6 mt-4 text-lg font-bold text-red-500";
      } else {
        const won = data.winner === socket.id;
        msg.innerText = won ? "You Win! ⚡" : "Too Slow!";
        msg.className = `h-6 mt-4 text-lg font-bold ${won ? 'text-green-400' : 'text-red-400'}`;
      }
      
      btn.style.display = 'block';
      btn.innerText = "Play Again";
    });

  </script>
</body>
</html>
