<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Watch-Night | Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #00f3ff; --secondary: #bc13fe; --bg: #050505; }
    body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }
    
    @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes glowPulse { 0% { text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary); } 50% { text-shadow: 0 0 20px var(--primary), 0 0 40px var(--primary), 0 0 60px var(--secondary); } 100% { text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary); } }
    
    #splash-screen { position: fixed; inset: 0; z-index: 9999; background: radial-gradient(circle at center, #0a0a12 0%, #000000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s ease; }
    #splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

    .splash-title { font-family: 'Orbitron', sans-serif; font-size: 10vw; font-weight: 900; color: white; z-index: 1; text-align: center; line-height: 0.9; background: transparent; border: none; }
    .splash-title span { color: var(--primary); display: inline-block; animation: glowPulse 2s infinite; }

    .glass { background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .neon-btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: black; font-weight: bold; transition: all 0.3s; }
    .neon-btn:hover { filter: brightness(1.2); box-shadow: 0 0 20px var(--primary); }
    
    .mode-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; perspective: 1000px; }
    .mode-card:hover { transform: translateY(-10px) scale(1.02); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0, 243, 255, 0.2); }
    
    .code-container { position: relative; padding: 15px 20px; border-radius: 20px; background: linear-gradient(135deg, rgba(0, 243, 255, 0.1), rgba(188, 19, 254, 0.1)); border: 1px solid rgba(0, 243, 255, 0.3); animation: float 3s ease-in-out infinite; }
    @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
    
    /* RESPONSIVE CODE TEXT */
    .code-text { 
        font-family: 'Orbitron', sans-serif; 
        font-weight: 900; 
        /* Fluid font size: min size 2rem, preferred 8vw, max size 4rem */
        font-size: clamp(1.5rem, 8vw, 4rem); 
        background: linear-gradient(to bottom, #fff, #00f3ff); 
        -webkit-background-clip: text; 
        -webkit-text-fill-color: transparent; 
        letter-spacing: 4px; 
        text-shadow: 0 0 20px rgba(0, 243, 255, 0.5); 
    }

    .anim-fade-in-up { animation: fadeInUp 0.8s ease forwards; opacity: 0; }

    #errorModal { position: fixed; inset: 0; z-index: 99999; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; }
    .error-box { background: rgba(20, 10, 10, 0.9); border: 2px solid #ff4757; padding: 40px; border-radius: 20px; text-align: center; max-width: 400px; }
    
    /* Prevent iOS Zoom on inputs */
    input[type="text"] { font-size: 16px; }
  </style>
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div id="splash-screen">
    <div class="text-lg tracking-widest text-gray-400 uppercase mb-4 anim-fade-in-up" style="animation-delay: 0.2s">Welcome to</div>
    <div class="splash-title anim-fade-in-up" style="animation-delay: 0.4s">WATCH<br><span>NIGHT</span></div>
    <div class="mt-8 text-xl md:text-2xl font-bold text-gray-300 anim-fade-in-up" style="animation-delay: 0.6s">
        Made with <span class="text-red-500 text-3xl">❤</span> by Nikhil (Nixton)
    </div>
  </div>

  <!-- ERROR POPUP -->
  <div id="errorModal">
    <div class="error-box glass">
      <div class="text-6xl mb-4">⚠️</div>
      <h2 class="text-2xl font-bold text-red-500 mb-2">Oops!</h2>
      <p id="errorMessage" class="text-gray-300 mb-6">Something went wrong.</p>
      <button onclick="closeError()" class="neon-btn px-6 py-2 rounded-lg">Try Again</button>
    </div>
  </div>

  <!-- SETUP CONTAINER -->
  <div id="setupContainer" class="hidden h-screen w-screen flex items-center justify-center p-4">
    <div class="w-full max-w-lg glass p-6 md:p-8 rounded-2xl border-l-4 border-l-[var(--primary)] anim-fade-in-up">
      <div class="text-center mb-8">
        <h1 class="text-3xl md:text-4xl font-bold" style="font-family: 'Orbitron'; text-shadow: 0 0 10px var(--primary);">START PARTY</h1>
      </div>

      <div class="space-y-4">
        <input type="text" id="nameInput" placeholder="Your Name" class="w-full bg-black/50 border border-white/10 rounded p-3 text-lg focus:outline-none focus:border-[var(--primary)]">

        <button onclick="createParty()" class="w-full neon-btn py-3 rounded-lg text-lg">Create Party</button>
        
        <div class="flex gap-2">
          <input type="text" id="codeInput" placeholder="Enter Code" class="flex-1 bg-black/50 border border-white/10 rounded p-3 text-lg focus:outline-none text-center uppercase tracking-widest">
          <button onclick="joinParty()" class="neon-btn px-6 rounded-lg text-lg">Join</button>
        </div>
      </div>
    </div>
  </div>

  <!-- LOBBY CONTAINER -->
  <div id="lobbyContainer" class="hidden h-screen w-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-5xl text-center anim-fade-in-up">
      
      <!-- Code Display -->
      <div class="mb-8 md:mb-12 flex flex-col items-center">
         <p class="text-gray-400 text-xs md:text-sm uppercase tracking-widest mb-2">Connected to Party</p>
         <div class="code-container">
           <div id="displayCode" class="code-text">------</div>
         </div>
         <button onclick="copyCode()" class="mt-4 text-xs text-gray-400 hover:text-white flex items-center gap-1">
           <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
           Copy Code
         </button>
      </div>

      <h3 class="text-lg md:text-xl text-gray-300 mb-6 uppercase tracking-widest">Select Mode</h3>

      <!-- Grid: 2 cols on tablet, 4 cols on desktop, 1 col on very small mobile if needed -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 w-full px-2">
        
        <!-- Watch Together -->
        <a href="watch.html" class="mode-card glass p-4 md:p-6 rounded-2xl cursor-pointer border border-white/10 flex flex-col items-center justify-center h-40 md:h-48 relative overflow-hidden group">
          <div class="absolute inset-0 bg-gradient-to-b from-[var(--primary)]/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
          <div class="text-4xl md:text-5xl mb-2 md:mb-3 transform group-hover:scale-110 transition-transform">🎬</div>
          <h2 class="text-base md:text-xl font-bold" style="font-family: 'Orbitron'">Watch Together</h2>
          <p class="text-[10px] md:text-xs text-gray-500 mt-1">Stream in Sync</p>
        </a>

        <!-- Tic Tac Toe -->
        <a href="game.html" class="mode-card glass p-4 md:p-6 rounded-2xl cursor-pointer border border-white/10 flex flex-col items-center justify-center h-40 md:h-48 relative overflow-hidden group">
          <div class="absolute inset-0 bg-gradient-to-b from-[var(--secondary)]/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
          <div class="text-4xl md:text-5xl mb-2 md:mb-3 transform group-hover:scale-110 transition-transform">⭕</div>
          <h2 class="text-base md:text-xl font-bold" style="font-family: 'Orbitron'">Tic Tac Toe</h2>
          <p class="text-[10px] md:text-xs text-gray-500 mt-1">Classic Battle</p>
        </a>

        <!-- Think & Draw -->
        <a href="draw.html" class="mode-card glass p-4 md:p-6 rounded-2xl cursor-pointer border border-white/10 flex flex-col items-center justify-center h-40 md:h-48 relative overflow-hidden group">
          <div class="absolute inset-0 bg-gradient-to-b from-green-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
          <div class="text-4xl md:text-5xl mb-2 md:mb-3 transform group-hover:scale-110 transition-transform">🎨</div>
          <h2 class="text-base md:text-xl font-bold" style="font-family: 'Orbitron'">Think & Draw</h2>
          <p class="text-[10px] md:text-xs text-gray-500 mt-1">Guess the Drawing</p>
        </a>

        <!-- Ludo -->
        <a href="ludo.html" class="mode-card glass p-4 md:p-6 rounded-2xl cursor-pointer border border-white/10 flex flex-col items-center justify-center h-40 md:h-48 relative overflow-hidden group">
          <div class="absolute inset-0 bg-gradient-to-b from-orange-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
          <div class="text-4xl md:text-5xl mb-2 md:mb-3 transform group-hover:scale-110 transition-transform">🎲</div>
          <h2 class="text-base md:text-xl font-bold" style="font-family: 'Orbitron'">Ludo</h2>
          <p class="text-[10px] md:text-xs text-gray-500 mt-1">Board Game</p>
        </a>

      </div>
      
      <button onclick="leaveParty()" class="mt-8 md:mt-10 text-gray-600 hover:text-red-500 text-sm transition-colors">Leave Party</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/voice-manager.js"></script>
  <script>
    const socket = io();
    let uid = localStorage.getItem('watchNightUid') || ('uid-' + Math.random().toString(36).substr(2, 9));
    localStorage.setItem('watchNightUid', uid);
    
    const setupContainer = document.getElementById('setupContainer');
    const lobbyContainer = document.getElementById('lobbyContainer');
    const displayCode = document.getElementById('displayCode');

    window.onload = () => {
      initVoiceSystem(socket);
      const urlParams = new URLSearchParams(window.location.search);
      const skipSplash = urlParams.get('skipSplash');

      if (skipSplash === '1') {
        window.history.replaceState({}, document.title, window.location.pathname);
        document.getElementById('splash-screen').classList.add('hidden');
        const existingCode = localStorage.getItem('partyCode');
        const existingName = localStorage.getItem('watchNightName');
        if (existingCode && existingName) socket.emit('join-party', { roomId: existingCode, name: existingName, uid });
        else setupContainer.classList.remove('hidden');
      } else {
        setTimeout(() => {
          document.getElementById('splash-screen').classList.add('hidden');
          const existingCode = localStorage.getItem('partyCode');
          const existingName = localStorage.getItem('watchNightName');
          if (existingCode && existingName) socket.emit('join-party', { roomId: existingCode, name: existingName, uid });
          else setupContainer.classList.remove('hidden');
        }, 3000); 
      }
    };

    function createParty() {
      const name = document.getElementById('nameInput').value || 'Host';
      localStorage.setItem('watchNightName', name);
      socket.emit('create-party', { name, uid });
    }

    socket.on('party-created', (data) => {
      localStorage.setItem('partyCode', data.roomId);
      localStorage.setItem('isHost', 'true');
      showLobby(data.roomId);
      startVoice(data.roomId, localStorage.getItem('watchNightName'));
    });

    function joinParty() {
      const name = document.getElementById('nameInput').value || 'Guest';
      const code = document.getElementById('codeInput').value.toUpperCase();
      if(!code) return showError("Please enter a code");
      localStorage.setItem('watchNightName', name);
      localStorage.setItem('partyCode', code);
      localStorage.setItem('isHost', 'false');
      socket.emit('join-party', { roomId: code, name, uid });
    }

    socket.on('party-joined', (data) => {
      localStorage.setItem('partyCode', data.roomId);
      showLobby(data.roomId);
      startVoice(data.roomId, localStorage.getItem('watchNightName'));
    });

    socket.on('error', (msg) => {
        showError(msg);
        if(msg.includes('not found')) { localStorage.removeItem('partyCode'); localStorage.removeItem('isHost'); }
    });

    function showLobby(code) { setupContainer.classList.add('hidden'); lobbyContainer.classList.remove('hidden'); displayCode.innerText = code; }
    function showError(msg) { document.getElementById('errorMessage').innerText = msg; document.getElementById('errorModal').style.display = 'flex'; }
    function closeError() { document.getElementById('errorModal').style.display = 'none'; location.reload(); }
    function copyCode() { navigator.clipboard.writeText(displayCode.innerText); const btn = document.querySelector('[onclick="copyCode()"]'); const original = btn.innerHTML; btn.innerHTML = "✓ Copied!"; setTimeout(() => btn.innerHTML = original, 1500); }
    function leaveParty() { localStorage.removeItem('partyCode'); localStorage.removeItem('isHost'); location.reload(); }
  </script>
</body>
</html>
