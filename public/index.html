<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch-Night | Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #00f3ff; --secondary: #bc13fe; --bg: #050505; }
    body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; overflow: hidden; }
    @keyframes fadeIn { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes zoomIn { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }
    
    /* Splash & Background */
    #splash-screen { position: fixed; inset: 0; z-index: 9999; background: radial-gradient(circle at center, #0a0a12 0%, #000000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease; }
    #splash-screen.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .splash-title { font-family: 'Orbitron', sans-serif; font-size: 8vw; font-weight: 900; color: white; text-align: center; line-height: 1.1; }
    .splash-title span { color: var(--primary); display: inline-block; }

    /* Modal */
    #nameModal { position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; }
    .glass { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .neon-btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: black; font-weight: bold; transition: 0.2s; }
    .neon-btn:hover { filter: brightness(1.2); }
    .input-futuristic { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.1); color: white; }
    .input-futuristic:focus { outline: none; border-color: var(--primary); }

    /* Lobby UI */
    .mode-btn { transition: 0.2s; border: 2px solid transparent; opacity: 0.6; }
    .mode-btn.active { border-color: var(--primary); opacity: 1; background: rgba(0,243,255,0.1); }
    
    .anim-fade-in { animation: fadeIn 0.6s ease forwards; opacity: 0; }
  </style>
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div id="splash-screen">
    <div class="splash-title" style="animation: zoomIn 1s ease forwards; animation-delay: 0.2s">WATCH<br><span>NIGHT</span></div>
    <div class="mt-8 text-2xl text-gray-300" style="animation: fadeIn 1s ease forwards; animation-delay: 0.5s">Made with ❤ by Nikhil (Nixton)</div>
  </div>

  <!-- NAME MODAL (Compulsory) -->
  <div id="nameModal">
    <div class="glass p-8 rounded-2xl w-11/
