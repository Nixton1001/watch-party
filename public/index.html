<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch-Night | Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #00f3ff; --secondary: #bc13fe; --bg: #050505; }
    body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; overflow: hidden; }
    
    @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes glowPulse { 0% { text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary); } 50% { text-shadow: 0 0 20px var(--primary), 0 0 40px var(--primary); } 100% { text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary); } }
    @keyframes zoomIn { 0% { opacity: 0; transform: scale(0.5); filter: blur(10px); } 100% { opacity: 1; transform: scale(1); filter: blur(0); } }
    @keyframes bgPan { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    #splash-screen { position: fixed; inset: 0; z-index: 9999; background: radial-gradient(circle at center, #0a0a12 0%, #000000 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.8s ease, visibility 0.8s ease; }
    #splash-screen.hidden { opacity: 0; visibility: hidden; }

    .splash-bg-effect { position: absolute; width: 150%; height: 150%; background: radial-gradient(circle, transparent 0%, #000 80%), linear-gradient(0deg, transparent 24%, var(--primary) 25%, var(--primary) 26%, transparent 27%, transparent 74%, var(--primary) 75%, var(--primary) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, var(--primary) 25%, var(--primary) 26%, transparent 27%, transparent 74%, var(--primary) 75%, var(--primary) 76%, transparent 77%, transparent); background-size: 100% 100%, 50px 50px, 50px 50px; opacity: 0.05; z-index: 0; animation: bgPan 10s linear infinite; }
    .splash-title { font-family: 'Orbitron', sans-serif; font-size: 8vw; font-weight: 900; color: white; z-index: 1; text-align: center; line-height: 1.1; }
    .splash-title span { color: var(--primary); display: inline-block; animation: glowPulse 2s infinite; }

    .glass { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .neon-btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); color: black; font-weight: bold; transition: all 0.3s; border: none; }
    .neon-btn:hover { filter: brightness(1.2); box-shadow: 0 0 20px var(--primary); transform: translateY(-2px); }
    
    .outline-btn { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; transition: all 0.3s; }
    .outline-btn:hover { border-color: var(--primary); color: var(--primary); background: rgba(0, 243, 255, 0.05); }
    .outline-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(0, 243, 255, 0.1); }

    .input-futuristic { background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.1); color: white; transition: all 0.3s; }
    .input-futuristic:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }

    .card-hover { transition: all 0.4s; cursor: pointer; }
    .card-hover:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 0 30px rgba(0, 243, 255, 0.2); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(5px); }
    .anim-fade-in { animation: fadeInUp 0.5s ease forwards; opacity: 0; }

    @media (max-width: 768px) { .splash-title { font-size: 12vw; } }
  </style>
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div id="splash-screen">
    <div class="splash-bg-effect"></div>
    <div class="text-lg tracking-widest text-gray-400 uppercase" style="animation: fadeInUp 1s ease forwards; opacity: 0; animation-delay: 0.2s">Welcome to</div>
    <div class="splash-title" style="animation: zoomIn 1.2s ease forwards; opacity: 0; animation-delay: 0.4s">WATCH<br><span>NIGHT</span></div>
    <div class="mt-8 text-gray-400" style="animation: fadeInUp 1s ease forwards; opacity: 0; animation-delay: 0.6s">Made with <span class="text-red-500">❤</span> by Nikhil</div>
  </div>

  <!-- MAIN HUB -->
  <div id="mainHub" class="h-screen w-screen flex flex-col items-center justify-center p-6 opacity-0 transition-opacity duration-1000">
    
    <!-- Global Name Input -->
    <div class="mb-8 w-full max-w-md anim-fade-in" style="animation-delay: 0.2s">
      <label class="text-xs text-gray-500 uppercase tracking-widest mb-1 block text-center">Your Identity</label>
      <input type="text" id="globalName" placeholder="Enter Your Name" class="w-full input-futuristic rounded-lg p-3 text-lg text-center font-bold tracking-wide">
    </div>

    <div class="text-center mb-8 anim-fade-in" style="animation-delay: 0.3s">
      <h1 class="text-5xl md:text-6xl font-bold" style="font-family: 'Orbitron'">SELECT MODE</h1>
      <div class="w-24 h-1 bg-gradient-to-r from-[var(--primary)] to-[var(--secondary)] mx-auto mt-4 rounded-full"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-3xl">
      
      <!-- Watch Together -->
      <div onclick="openModal('watch')" class="card-hover glass p-8 rounded-2xl border border-white/10 flex flex-col items-center justify-center h-64 relative overflow-hidden group anim-fade-in" style="animation-delay: 0.4s">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[var(--primary)] to-transparent group-hover:h-full group-hover:opacity-10 transition-all duration-500"></div>
        <div class="text-6xl mb-4">🎬</div>
        <h2 class="text-2xl font-bold" style="font-family: 'Orbitron'">Watch Together</h2>
        <p class="text-gray-400 mt-2 text-center text-sm">Stream videos in sync</p>
      </div>

      <!-- Game Zone -->
      <div onclick="openModal('game')" class="card-hover glass p-8 rounded-2xl border border-white/10 flex flex-col items-center justify-center h-64 relative overflow-hidden group anim-fade-in" style="animation-delay: 0.5s">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[var(--secondary)] to-transparent group-hover:h-full group-hover:opacity-10 transition-all duration-500"></div>
        <div class="text-6xl mb-4">🎮</div>
        <h2 class="text-2xl font-bold" style="font-family: 'Orbitron'">Game Zone</h2>
        <p class="text-gray-400 mt-2 text-center text-sm">Play online with friends</p>
      </div>

    </div>
  </div>

  <!-- MODAL OVERLAY -->
  <div id="modalOverlay" class="modal-overlay">
    <div class="glass p-6 rounded-2xl border-l-4 border-l-[var(--primary)] relative w-11/12 max-w-md">
      <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-500 hover:text-white text-xl">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    const socket = io();
    let currentMode = 'watch';
    let selectedGameType = 'tictactoe';

    window.onload = () => {
      setTimeout(() => {
        document.getElementById('splash-screen').classList.add('hidden');
        const hub = document.getElementById('mainHub');
        hub.style.opacity = '1';
      }, 3500);
      
      const savedName = localStorage.getItem('watchNightName');
      if(savedName) document.getElementById('globalName').value = savedName;
    };

    function getName() {
      const name = document.getElementById('globalName').value || 'Player';
      localStorage.setItem('watchNightName', name);
      return name;
    }

    function generateUID() { 
      return Math.random().toString(36).substring(2, 8).toUpperCase(); 
    }

    // --- MODAL LOGIC ---
    function openModal(mode) {
      currentMode = mode;
      document.getElementById('modalOverlay').style.display = 'flex';
      if(mode === 'watch') renderWatchModal();
      else renderGameSelectionModal();
    }

    function closeModal() {
      document.getElementById('modalOverlay').style.display = 'none';
    }

    // --- WATCH TOGETHER MODAL ---
    function renderWatchModal() {
      document.getElementById('modalBody').innerHTML = `
        <h3 class="text-xl font-bold mb-4 text-center" style="font-family: 'Orbitron'">Watch Together</h3>
        <div class="space-y-3">
          <button onclick="createRoom('watch')" class="w-full neon-btn py-3 rounded-lg">Create Room</button>
          <div class="text-center text-gray-500 text-xs">OR</div>
          <input type="text" id="joinCodeInput" placeholder="Enter Room Code" class="w-full input-futuristic rounded-lg p-3 uppercase text-center tracking-widest">
          <button onclick="joinRoom('watch')" class="w-full outline-btn py-3 rounded-lg font-bold">Join Room</button>
        </div>
      `;
    }

    // --- GAME ZONE MODAL ---
    function renderGameSelectionModal() {
      document.getElementById('modalBody').innerHTML = `
        <h3 class="text-xl font-bold mb-4 text-center" style="font-family: 'Orbitron'">Select Game</h3>
        <div class="grid grid-cols-2 gap-3 mb-4">
          <button onclick="selectGame('tictactoe')" id="btn-ttt" class="outline-btn p-3 rounded-lg text-sm active">Tic Tac Toe</button>
          <button onclick="selectGame('reflex')" id="btn-reflex" class="outline-btn p-3 rounded-lg text-sm">Reflex Duel</button>
        </div>
        <div class="space-y-3">
          <button onclick="createRoom('game')" class="w-full neon-btn py-3 rounded-lg">Create Room</button>
          <div class="text-center text-gray-500 text-xs">OR</div>
          <input type="text" id="joinCodeInput" placeholder="Enter Room Code" class="w-full input-futuristic rounded-lg p-3 uppercase text-center tracking-widest">
          <button onclick="joinRoom('game')" class="w-full outline-btn py-3 rounded-lg font-bold">Join Room</button>
        </div>
      `;
      updateGameSelectionUI();
    }

    function selectGame(type) {
      selectedGameType = type;
      updateGameSelectionUI();
    }

    function updateGameSelectionUI() {
      const btnTTT = document.getElementById('btn-ttt');
      const btnReflex = document.getElementById('btn-reflex');
      if(btnTTT) btnTTT.classList.toggle('active', selectedGameType === 'tictactoe');
      if(btnReflex) btnReflex.classList.toggle('active', selectedGameType === 'reflex');
    }

    // --- CORE ACTIONS ---
    function createRoom(type) {
      const name = getName();
      const roomId = generateUID();
      
      if(type === 'watch') {
        window.location.href = `/watch.html?action=create&room=${roomId}&name=${encodeURIComponent(name)}`;
      } else {
        window.location.href = `/game.html?action=create&room=${roomId}&name=${encodeURIComponent(name)}&game=${selectedGameType}`;
      }
    }

    function joinRoom(type) {
      const name = getName();
      const code = document.getElementById('joinCodeInput').value.toUpperCase();
      if(!code) return alert("Please enter a code");

      if(type === 'watch') {
        window.location.href = `/watch.html?action=join&room=${code}&name=${encodeURIComponent(name)}`;
      } else {
        window.location.href = `/game.html?action=join&room=${code}&name=${encodeURIComponent(name)}`;
      }
    }

  </script>
</body>
</html>
