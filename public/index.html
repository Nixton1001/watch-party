<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Watch-Night | Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #00f3ff; --secondary: #bc13fe; --bg: #050505; }
    body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; overflow: hidden; }
    
    /* Animations */
    @keyframes fadeInUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }
    @keyframes glowPulse { 0% { text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary); } 50% { text-shadow: 0 0 20px var(--primary), 0 0 40px var(--primary), 0 0 60px var(--primary); } 100% { text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary); } }
    @keyframes zoomIn { 0% { opacity: 0; transform: scale(0.5); filter: blur(10px); } 100% { opacity: 1; transform: scale(1); filter: blur(0); } }
    @keyframes heartBeat { 0% { transform: scale(1); } 25% { transform: scale(1.2); } 40% { transform: scale(1); } 60% { transform: scale(1.2); } 100% { transform: scale(1); } }
    @keyframes bgPan { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

    /* Splash Screen Styles */
    #splash-screen { 
      position: fixed; inset: 0; z-index: 9999; 
      background: radial-gradient(circle at center, #0a0a12 0%, #000000 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center; 
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #splash-screen.hidden { opacity: 0; visibility: hidden; }

    .splash-bg-effect {
      position: absolute; width: 150%; height: 150%; 
      background: radial-gradient(circle, transparent 0%, #000 80%),
                  linear-gradient(0deg, transparent 24%, var(--primary) 25%, var(--primary) 26%, transparent 27%, transparent 74%, var(--primary) 75%, var(--primary) 76%, transparent 77%, transparent),
                  linear-gradient(90deg, transparent 24%, var(--primary) 25%, var(--primary) 26%, transparent 27%, transparent 74%, var(--primary) 75%, var(--primary) 76%, transparent 77%, transparent);
      background-size: 100% 100%, 50px 50px, 50px 50px;
      opacity: 0.05; z-index: 0;
      animation: bgPan 10s linear infinite;
    }

    .splash-title { font-family: 'Orbitron', sans-serif; font-size: 8vw; font-weight: 900; color: white; z-index: 1; text-align: center; line-height: 1.1; }
    .splash-title span { color: var(--primary); display: inline-block; animation: glowPulse 2s infinite; }

    .splash-sub { margin-top: 2rem; font-size: 1.5rem; color: rgba(255,255,255,0.8); z-index: 1; display: flex; align-items: center; gap: 10px; }
    .splash-heart { color: #ff4757; animation: heartBeat 1.5s ease infinite; }

    /* Main Hub Styles */
    .glow-text { text-shadow: 0 0 10px var(--primary), 0 0 20px var(--primary); }
    .glass { background: rgba(10, 10, 10, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .neon-btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); transition: all 0.3s; }
    .neon-btn:hover { filter: brightness(1.2); box-shadow: 0 0 20px var(--primary); transform: translateY(-2px); }

    .card-hover { transition: all 0.4s; }
    .card-hover:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 0 30px rgba(0, 243, 255, 0.2); }

    /* Animation Helper Classes */
    .anim-fade-in-up { animation: fadeInUp 1s ease forwards; opacity: 0; }
    .anim-zoom-in { animation: zoomIn 1.2s ease forwards; opacity: 0; }
    .anim-fade-in { animation: fadeIn 1s ease forwards; opacity: 0; }
    
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.4s; }
    .delay-3 { animation-delay: 0.6s; }
    .delay-4 { animation-delay: 0.8s; }

    @media (max-width: 768px) {
      .splash-title { font-size: 12vw; }
    }
  </style>
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div id="splash-screen">
    <div class="splash-bg-effect"></div>
    
    <div class="anim-fade-in-up delay-1 text-lg tracking-widest text-gray-400 uppercase">Welcome to</div>
    
    <div class="splash-title anim-zoom-in delay-2 mt-4">
      WATCH<br><span>NIGHT</span>
    </div>
    
    <div class="splash-sub anim-fade-in delay-3 mt-8">
      Made with <span class="splash-heart">❤</span> by Nikhil (Nixton)
    </div>
  </div>

  <!-- MAIN HUB (Categories) -->
  <div id="mainHub" class="h-screen w-screen flex flex-col items-center justify-center p-6 opacity-0 transition-opacity duration-1000">
    
    <div class="text-center mb-16">
      <h1 class="text-5xl md:text-6xl font-bold glow-text" style="font-family: 'Orbitron'">
        SELECT CATEGORY
      </h1>
      <div class="w-24 h-1 bg-gradient-to-r from-[var(--primary)] to-[var(--secondary)] mx-auto mt-4 rounded-full"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-5xl">
      
      <!-- Watch Together -->
      <a href="/watch.html" class="card-hover glass p-8 rounded-2xl cursor-pointer border border-white/10 flex flex-col items-center justify-center h-64 relative overflow-hidden group">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[var(--primary)] to-transparent group-hover:h-full group-hover:opacity-10 transition-all duration-500"></div>
        <div class="text-6xl mb-4">🎬</div>
        <h2 class="text-2xl font-bold" style="font-family: 'Orbitron'">Watch Together</h2>
        <p class="text-gray-400 mt-2 text-center text-sm">Stream with friends</p>
      </a>

      <!-- Games -->
      <a href="/games.html" class="card-hover glass p-8 rounded-2xl cursor-pointer border border-white/10 flex flex-col items-center justify-center h-64 relative overflow-hidden group">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-[var(--secondary)] to-transparent group-hover:h-full group-hover:opacity-10 transition-all duration-500"></div>
        <div class="text-6xl mb-4">🎮</div>
        <h2 class="text-2xl font-bold" style="font-family: 'Orbitron'">Game Zone</h2>
        <p class="text-gray-400 mt-2 text-center text-sm">Play & Compete</p>
      </a>

      <!-- More -->
      <a href="#" class="card-hover glass p-8 rounded-2xl cursor-pointer border border-white/10 flex flex-col items-center justify-center h-64 relative overflow-hidden group opacity-60 hover:opacity-100">
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-gray-500 to-transparent"></div>
        <div class="text-6xl mb-4">🚀</div>
        <h2 class="text-2xl font-bold" style="font-family: 'Orbitron'">More</h2>
        <p class="text-gray-400 mt-2 text-center text-sm">Coming Soon</p>
      </a>

    </div>
  </div>

  <script>
    window.onload = () => {
      // Wait for splash animation to finish (approx 3.5 seconds)
      setTimeout(() => {
        // 1. Fade out splash screen
        document.getElementById('splash-screen').classList.add('hidden');
        
        // 2. Show Main Hub with fade in
        const hub = document.getElementById('mainHub');
        hub.style.opacity = '1';
        hub.classList.remove('opacity-0');

      }, 3500); // Adjust time based on animation duration
    };
  </script>
</body>
</html>
