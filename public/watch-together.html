<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Watch-Night | Watch Together</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #00f3ff; --secondary: #bc13fe; --bg: #050505; }
    body { font-family: 'Rajdhani', sans-serif; background: var(--bg); color: white; overflow: hidden; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: linear-gradient(var(--primary), var(--secondary)); border-radius: 3px; }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0, 243, 255, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(0, 243, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 243, 255, 0); } }
    
    /* Utility Classes */
    .glass { background: rgba(10, 10, 10, 0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .neon-btn { background: linear-gradient(45deg, var(--primary), var(--secondary)); transition: all 0.3s; }
    .neon-btn:hover { filter: brightness(1.2); box-shadow: 0 0 20px var(--primary); transform: translateY(-2px); }
    
    .hidden { display: none !important; }
    
    /* Splash/Overlays */
    .overlay { position: fixed; inset: 0; z-index: 100; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.3s ease; }
    
    /* Video Room Specific */
    .watch-box { position: relative; border: 2px solid rgba(0, 243, 255, 0.2); border-radius: 12px; overflow: hidden; background: #000; }
    .watch-box::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--primary), var(--secondary)); z-index: 10; }

    .room-code-display { font-family: 'Orbitron', sans-serif; letter-spacing: 4px; font-size: 1rem; color: var(--primary); background: rgba(0, 243, 255, 0.1); padding: 4px 12px; border-radius: 4px; border: 1px solid var(--primary); cursor: pointer; transition: all 0.3s; }
    .room-code-display:hover { background: rgba(0, 243, 255, 0.2); }

    .chat-msg { animation: slideIn 0.3s ease; margin-bottom: 8px; padding: 8px 12px; border-radius: 8px; background: rgba(255,255,255,0.05); border-left: 3px solid var(--secondary); }
    
    .control-icon { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); cursor: pointer; transition: all 0.2s; }
    .control-icon.active { background: var(--primary); color: black; border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }
    .control-icon.danger { background: #ff4757; border-color: #ff4757; }

    .peer-box { width: 120px; height: 90px; background: #000; border: 1px solid var(--secondary); border-radius: 8px; overflow: hidden; position: relative; }
    .peer-box video { width: 100%; height: 100%; object-fit: cover; }
    .peer-name { position: absolute; bottom: 0; width: 100%; background: rgba(0,0,0,0.7); font-size: 10px; padding: 2px; text-align: center; }

    /* Tabs */
    .tab-btn { flex: 1; padding: 12px; border-bottom: 2px solid transparent; color: #666; transition: all 0.2s; }
    .tab-btn.active { border-color: var(--primary); color: var(--primary); }

    /* Mobile Bottom Bar */
    @media (max-width: 768px) {
      .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.95); border-top: 1px solid #333; padding: 10px; z-index: 50; display: flex; justify-content: center; gap: 20px; }
      #sidebar { position: fixed; right: 0; top: 0; bottom: 0; width: 85%; transform: translateX(100%); transition: transform 0.3s; z-index: 60; border-left: 1px solid #333; }
      #sidebar.open { transform: translateX(0); }
      .video-wrapper { height: calc(100vh - 70px); }
    }
  </style>
</head>
<body>

  <!-- STEP 1: NAME ENTRY -->
  <div id="nameEntry" class="overlay">
    <div class="glass p-8 rounded-2xl w-full max-w-md text-center space-y-6 border-l-4 border-l-[var(--primary)]">
      <div class="text-6xl mb-4">🎬</div>
      <h1 class="text-3xl font-bold glow-text" style="font-family: 'Orbitron'">WATCH TOGETHER</h1>
      <p class="text-gray-400 text-sm">Enter your identity to join the stream</p>
      <input type="text" id="usernameInput" placeholder="Enter Your Name" class="w-full bg-black/50 border border-white/10 rounded-lg p-3 text-center text-xl focus:outline-none focus:border-[var(--primary)] text-white placeholder-gray-600">
      <button onclick="enterLobby()" class="w-full neon-btn text-black font-bold py-3 rounded-lg text-lg">CONTINUE</button>
      <a href="/" class="block text-gray-500 hover:text-white text-xs mt-4">← Back to Hub</a>
    </div>
  </div>

  <!-- STEP 2: LOBBY (Create/Join) -->
  <div id="lobbySection" class="overlay hidden">
    <div class="glass p-8 rounded-2xl w-full max-w-md space-y-6 border-l-4 border-l-[var(--secondary)]">
      <div class="text-center">
        <h2 class="text-xl text-gray-400 uppercase tracking-widest">Welcome,</h2>
        <h1 id="welcomeName" class="text-4xl font-bold glow-text mt-2" style="font-family: 'Orbitron'"></h1>
      </div>
      <div class="space-y-4">
        <button onclick="handleCreate()" class="w-full neon-btn text-black font-bold py-4 rounded-lg text-lg tracking-wide">CREATE ROOM</button>
        
        <div class="flex items-center gap-2 text-gray-600">
            <div class="flex-1 h-px bg-white/10"></div> OR <div class="flex-1 h-px bg-white/10"></div>
        </div>

        <div class="space-y-2">
            <input type="text" id="roomCodeInput" placeholder="ENTER ROOM CODE" class="w-full bg-black/30 border border-white/10 rounded-lg p-3 uppercase tracking-widest text-center focus:outline-none focus:border-[var(--secondary)] text-white placeholder-gray-600">
            <button onclick="handleJoin()" class="w-full bg-white/5 border border-white/20 font-bold py-3 rounded-lg hover:bg-white/10 transition text-gray-300 hover:text-white">JOIN ROOM</button>
        </div>
      </div>
    </div>
  </div>

  <!-- STEP 3: VIDEO ROOM -->
  <div id="videoRoom" class="hidden h-screen w-screen flex relative">
    
    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-full">
      
      <!-- TOP BAR -->
      <div class="absolute top-0 left-0 right-0 z-20 flex justify-between items-center p-3 bg-gradient-to-b from-black/80 to-transparent md:pr-[330px]">
        <button onclick="leaveRoom()" class="control-icon text-xs" style="width:35px; height:35px; background: rgba(255,255,255,0.1);">✕</button>
        <div class="room-code-display" id="displayRoomCode" onclick="copyCode()" title="Click to Copy">------</div>
        <button onclick="toggleSidebar()" class="control-icon md:hidden" style="width:35px; height:35px;">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
      </div>

      <!-- VIDEO PLAYER WRAPPER -->
      <div class="flex-1 flex items-center justify-center p-2 pt-12 pb-20 md:p-4 md:pt-2 video-wrapper">
        <div class="watch-box w-full h-full flex items-center justify-center relative">
          <video id="mainVideo" class="w-full h-full" playsinline></video>
          <div id="mobilePlayOverlay" class="absolute inset-0 flex items-center justify-center bg-black/5 hidden z-10">
            <button onclick="forcePlay()" class="neon-btn px-8 py-3 rounded-lg text-black font-bold">Tap to Play</button>
          </div>
        </div>
      </div>

      <!-- VIDEO CONTROLS -->
      <div class="absolute bottom-0 left-0 right-0 z-20 bg-gradient-to-t from-black to-transparent p-4 md:pr-[330px]">
        <div class="flex items-center gap-4">
          <button onclick="togglePlayPause()" class="control-btn p-2 rounded-full bg-white/10 hover:bg-white/20">
            <svg id="playIcon" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
            <svg id="pauseIcon" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          </button>
          <span id="timeDisplay" class="text-xs font-mono text-gray-300 w-24">0:00 / 0:00</span>
          <div class="flex-1"></div>
          <button onclick="requestSync()" class="text-xs text-[var(--primary)] hover:underline">Sync</button>
        </div>
      </div>
    </div>

    <!-- SIDEBAR -->
    <div id="sidebar" class="hidden md:flex flex-col w-full md:w-[320px] glass border-l border-white/10 h-full overflow-hidden absolute right-0 top-0 bottom-0 md:relative">
      
      <!-- TABS -->
      <div class="flex border-b border-white/10 bg-black/20">
        <button onclick="showTab('chat')" id="tab-chat" class="tab-btn active">Chat</button>
        <button onclick="showTab('settings')" id="tab-settings" class="tab-btn">Settings</button>
      </div>

      <!-- CHAT TAB -->
      <div id="content-chat" class="flex-1 flex flex-col overflow-hidden">
        <div id="chatBox" class="flex-1 p-4 overflow-y-auto">
           <!-- Messages -->
        </div>
        <div class="p-3 border-t border-white/10 bg-black/20">
          <div class="flex gap-2">
            <input type="text" id="chatInput" placeholder="Message..." class="flex-1 bg-white/5 p-2 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-[var(--primary)]" onkeypress="if(event.key==='Enter')sendMessage()">
            <button onclick="sendMessage()" class="text-[var(--primary)] p-2 hover:bg-white/10 rounded-lg">
              <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
          </div>
        </div>
      </div>

      <!-- SETTINGS TAB -->
      <div id="content-settings" class="flex-1 p-4 overflow-y-auto hidden space-y-4">
        <div class="text-gray-500 text-xs uppercase mb-2">Video Source (Host Only)</div>
        <input type="text" id="videoLinkInput" placeholder="Paste Video URL" class="w-full bg-white/5 p-2 rounded text-sm border border-white/10 focus:outline-none">
        <button onclick="loadLink()" class="w-full bg-white/10 p-2 rounded text-sm hover:bg-white/20">Load URL</button>
        
        <label class="block w-full text-center bg-white/5 p-2 rounded cursor-pointer hover:bg-white/10 border border-dashed border-white/20 text-gray-300 text-sm">
          <input type="file" id="videoUpload" accept="video/*" onchange="uploadVideo(this)" class="hidden">
          <span id="uploadLabel">Upload Local File</span>
        </label>

        <div class="pt-4 border-t border-white/10">
             <div class="text-gray-500 text-xs uppercase mb-2">Your Controls</div>
             <div class="flex justify-around">
               <button onclick="toggleMic()" id="micBtn" class="control-icon" title="Mic"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg></button>
               <button onclick="toggleCam()" id="camBtn" class="control-icon" title="Camera"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></button>
             </div>
        </div>
      </div>
    </div>

    <!-- MOBILE FLOATING CONTROLS -->
    <div class="md:hidden bottom-bar">
        <button onclick="toggleMic()" id="micBtnMobile" class="control-icon"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/></svg></button>
        <button onclick="toggleCam()" id="camBtnMobile" class="control-icon"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg></button>
        <button onclick="showTab('chat'); toggleSidebar();" class="control-icon">
             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        </button>
        <button onclick="leaveRoom()" class="control-icon danger">
             <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 8l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M5 3a2 2 0 00-2 2v1c0 8.284 6.716 15 15 15h1a2 2 0 002-2v-3.28a1 1 0 00-.684-.948l-4.493-1.498a1 1 0 00-1.21.502l-1.13 2.257a11.042 11.042 0 01-5.516-5.517l2.257-1.128a1 1 0 00.502-1.21L9.228 3.683A1 1 0 008.279 3H5z"/></svg>
        </button>
    </div>
    
    <!-- Peer Videos Overlay -->
    <div id="peerVideosContainer" class="absolute bottom-24 right-4 z-30 flex flex-col gap-2 md:bottom-4 md:right-[330px]"></div>
  </div>

  <script>
    const socket = io();
    const video = document.getElementById('mainVideo');
    const peerVideosContainer = document.getElementById('peerVideosContainer');
    
    let myStream, myName, isHost = false, isMicOn = false, isCamOn = false;
    const peers = {}, users = {};
    let currentRoomId = '';

    // --- 1. INITIALIZATION & UI ---

    function enterLobby() {
      const name = document.getElementById('usernameInput').value.trim();
      if (!name) return alert("Please enter a name");
      myName = name;
      socket.emit('save-user', name); // Save name to DB
      document.getElementById('nameEntry').classList.add('hidden');
      document.getElementById('lobbySection').classList.remove('hidden');
      document.getElementById('welcomeName').innerText = name;
    }

    function showTab(tabName) {
      document.querySelectorAll('[id^="content-"]').forEach(el => el.classList.add('hidden'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(`content-${tabName}`).classList.remove('hidden');
      document.getElementById(`tab-${tabName}`).classList.add('active');
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      if (window.innerWidth < 768) sidebar.classList.toggle('open');
    }

    function copyCode() {
      navigator.clipboard.writeText(currentRoomId);
      alert("Code Copied!");
    }

    // --- 2. ROOM LOGIC ---

    async function handleCreate() {
      await initMedia();
      socket.emit('create-room', { name: myName });
    }

    async function handleJoin() {
      const code = document.getElementById('roomCodeInput').value.toUpperCase();
      if (!code) return alert("Enter code");
      await initMedia();
      socket.emit('join-room', { roomId: code, name: myName });
    }

    socket.on('room-created', (data) => { isHost = true; initRoom(data.roomId); });
    socket.on('room-joined', (data) => { isHost = false; initRoom(data.roomId); if(data.videoSrc) { video.src = data.videoSrc; video.play().catch(e => document.getElementById('mobilePlayOverlay').classList.remove('hidden')); } });
    socket.on('error', (msg) => alert(msg));

    function initRoom(id) {
      currentRoomId = id;
      document.getElementById('displayRoomCode').innerText = id;
      document.getElementById('lobbySection').classList.add('hidden');
      document.getElementById('videoRoom').classList.remove('hidden');
      
      // Show sidebar by default on desktop
      if(window.innerWidth > 768) document.getElementById('sidebar').classList.remove('hidden');
      
      addChatMessage('SYSTEM', `Connected to Room: <strong>${id}</strong>. Share this code.`, '#00f3ff');
    }

    function leaveRoom() { window.location.href = '/'; }
    function forcePlay() { video.play(); document.getElementById('mobilePlayOverlay').classList.add('hidden'); }

    // --- 3. MEDIA & WEBRTC ---

    async function initMedia() {
      try {
        myStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        setupStream(true, true);
      } catch (err) {
        try {
          myStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
          setupStream(false, true);
        } catch (e) { alert("Microphone is required."); return; }
      }
    }

    function setupStream(hasVideo, micOn) {
      isMicOn = micOn;
      myStream.getAudioTracks()[0].enabled = micOn;
      if (hasVideo) { isCamOn = false; myStream.getVideoTracks()[0].enabled = false; }
      updateUI();
    }

    function toggleMic() {
      if (!myStream) return;
      const track = myStream.getAudioTracks()[0];
      if (track) track.enabled = !track.enabled;
      isMicOn = track.enabled;
      updateUI();
    }

    function toggleCam() {
      if (!myStream) return;
      const track = myStream.getVideoTracks()[0];
      if (track) track.enabled = !track.enabled;
      isCamOn = track.enabled;
      updateUI();
    }

    function updateUI() {
      document.querySelectorAll('#micBtn, #micBtnMobile').forEach(b => b.classList.toggle('active', isMicOn));
      document.querySelectorAll('#camBtn, #camBtnMobile').forEach(b => b.classList.toggle('active', isCamOn));
    }

    // WebRTC Signaling
    socket.on('user-joined', async (data) => {
      if (isHost) {
        const pc = createPeerConnection(data.id);
        peers[data.id] = pc;
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit('signal', { to: data.id, signal: { sdp: offer } });
      }
      users[data.id] = data.name;
      addChatMessage('SYSTEM', `${data.name} connected.`, '#888');
    });

    socket.on('signal', async (data) => {
      const fromId = data.from;
      if (!peers[fromId]) { const pc = createPeerConnection(fromId); peers[fromId] = pc; }
      const pc = peers[fromId];
      try {
        if (data.signal.sdp) {
          await pc.setRemoteDescription(new RTCSessionDescription(data.signal.sdp));
          if (pc.remoteDescription.type === 'offer') {
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit('signal', { to: fromId, signal: { sdp: answer } });
          }
        } else if (data.signal.candidate) {
          await pc.addIceCandidate(new RTCIceCandidate(data.signal.candidate));
        }
      } catch (e) { console.error(e); }
    });

    function createPeerConnection(peerId) {
      const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
      const pc = new RTCPeerConnection(config);
      if (myStream) myStream.getTracks().forEach(track => pc.addTrack(track, myStream));
      
      pc.ontrack = (event) => {
        let videoEl = document.getElementById(`video-${peerId}`);
        if (!videoEl) {
          const div = document.createElement('div'); div.className = 'peer-box'; div.id = `container-${peerId}`;
          videoEl = document.createElement('video'); videoEl.id = `video-${peerId}`; videoEl.autoplay = true; videoEl.playsInline = true;
          const nameTag = document.createElement('div'); nameTag.className = 'peer-name'; nameTag.innerText = users[peerId] || 'Peer';
          div.appendChild(videoEl); div.appendChild(nameTag); peerVideosContainer.appendChild(div);
        }
        videoEl.srcObject = event.streams[0];
        videoEl.play();
      };
      
      pc.onicecandidate = (event) => { if (event.candidate) socket.emit('signal', { to: peerId, signal: { candidate: event.candidate } }); };
      return pc;
    }

    // --- 4. VIDEO SYNC & CHAT ---

    function togglePlayPause() { if (video.paused) video.play(); else video.pause(); }
    video.onplay = () => { document.getElementById('mobilePlayOverlay').classList.add('hidden'); updatePlayBtn(); if (isHost) socket.emit('sync-video', { type: 'play', time: video.currentTime }); };
    video.onpause = () => { updatePlayBtn(); if (isHost) socket.emit('sync-video', { type: 'pause', time: video.currentTime }); };
    
    function updatePlayBtn() { document.getElementById('playIcon').classList.toggle('hidden', !video.paused); document.getElementById('pauseIcon').classList.toggle('hidden', video.paused); }
    
    setInterval(() => {
      const ct = Math.floor(video.currentTime); const d = Math.floor(video.duration);
      document.getElementById('timeDisplay').innerText = `${Math.floor(ct/60)}:${ct%60<10?'0':''}${ct%60} / ${Math.floor(d/60)}:${d%60<10?'0':''}${d%60}`;
    }, 1000);

    socket.on('sync-video', (data) => {
      if (data.type === 'play') video.play();
      if (data.type === 'pause') video.pause();
      if (data.time && Math.abs(video.currentTime - data.time) > 1) video.currentTime = data.time;
    });
    
    function requestSync() { socket.emit('request-state'); }
    socket.on('get-state', (data) => socket.emit('send-state', { to: data.requester, time: video.currentTime, playing: !video.paused }));

    function loadLink() { if (!isHost) return; video.src = document.getElementById('videoLinkInput').value; socket.emit('change-src', { src: video.src }); }
    function uploadVideo(input) {
      if (!isHost) return;
      const formData = new FormData();
      formData.append('video', input.files[0]);
      fetch('/upload', { method: 'POST', body: formData }).then(r => r.json()).then(data => {
        video.src = data.filePath; socket.emit('change-src', { src: data.filePath });
      });
    }
    socket.on('update-src', (data) => { video.src = data.src; video.play().catch(e => {}); });

    function addChatMessage(name, msg, color = 'white') {
      const div = document.createElement('div');
      div.className = 'chat-msg';
      div.innerHTML = `<span class="font-bold" style="color:${color}">${name}:</span> <span class="text-gray-200">${msg}</span>`;
      document.getElementById('chatBox').appendChild(div);
      document.getElementById('chatBox').scrollTop = 10000;
    }

    function sendMessage() {
      const input = document.getElementById('chatInput');
      if (!input.value.trim()) return;
      socket.emit('chat-message', { name: myName, msg: input.value });
      input.value = '';
    }
    socket.on('chat-message', (data) => addChatMessage(data.name, data.msg, '#bc13fe'));

  </script>
</body>
</html>
