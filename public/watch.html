  <script>
    const socket = io();
    const video = document.getElementById('mainVideo');
    const sidebar = document.getElementById('sidebar');
    const verticalBar = document.getElementById('verticalBar');
    const messagesContainer = document.getElementById('messagesContainer');
    const sourceControls = document.getElementById('sourceControls');
    const progressBar = document.getElementById('progressBar');
    const progressContainer = document.getElementById('progressContainer');
    
    let myStream, myName, isHost = false, isMicOn = false;
    let myUid = localStorage.getItem('watchNightUid') || generateUID();
    localStorage.setItem('watchNightUid', myUid);

    const peers = {}; 

    window.onload = async () => {
      const savedSession = localStorage.getItem('watchNightSession');
      const urlParams = new URLSearchParams(window.location.search);
      const action = urlParams.get('action');
      const roomParam = urlParams.get('room');
      const nameParam = urlParams.get('name');

      if (action === 'create' || (action === 'join' && roomParam)) {
        myName = nameParam || 'User';
        await getMedia();
        if (action === 'create') socket.emit('create-room', { name: myName, uid: myUid });
        else socket.emit('join-room', { roomId: roomParam, name: myName, uid: myUid });
      } else if (savedSession) {
        const session = JSON.parse(savedSession);
        myName = session.name;
        await getMedia();
        socket.emit('join-room', { roomId: session.roomId, name: session.name, uid: myUid });
      } else {
        document.getElementById('lobbyPage').classList.remove('hidden');
      }
    };

    function generateUID() { return 'xxxx-xxxx'.replace(/x/g, () => Math.floor(Math.random() * 16).toString(16)); }
    function saveSession(roomId, name) { localStorage.setItem('watchNightSession', JSON.stringify({ roomId, name })); }
    function clearSession() { localStorage.removeItem('watchNightSession'); }

    function showJoinInput() { document.getElementById('joinContainer').classList.toggle('hidden'); }
    async function handleCreate() {
      myName = document.getElementById('usernameInput').value || 'Host';
      await getMedia();
      socket.emit('create-room', { name: myName, uid: myUid });
    }
    async function handleJoin() {
      myName = document.getElementById('usernameInput').value || 'Guest';
      const room = document.getElementById('roomCodeInput').value.toUpperCase();
      if(!room) return;
      await getMedia();
      socket.emit('join-room', { roomId: room, name: myName, uid: myUid });
    }

    function addChatMessage(name, msg, color = 'white') {
      const div = document.createElement('div');
      div.className = 'chat-message text-sm';
      div.innerHTML = `<span class="font-bold" style="color:${color}">${name}:</span> ${msg}`;
      messagesContainer.appendChild(div);
      document.getElementById('chatBox').scrollTop = 10000;
    }
    function copyCode() {
        const code = document.getElementById('displayRoomCodeChat').innerText;
        navigator.clipboard.writeText(code);
        const el = document.getElementById('displayRoomCodeChat');
        const originalText = el.innerText;
        el.innerText = "COPIED!";
        setTimeout(() => el.innerText = originalText, 1000);
    }
    function closeWelcome() { document.getElementById('welcome-overlay').style.display = 'none'; }

    // --- FIX: AUDIO ROUTING (EARBUDS/SPEAKER) ---
    async function getMedia() {
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            console.warn("Audio not supported");
            return;
        }
        
        // STEP 1: Request VIDEO + AUDIO.
        // This forces the mobile browser into "Media/Video Call" mode.
        // This ensures audio routes to the Main Speaker or connected Earbuds.
        // If we only request Audio, phones treat it as a "Phone Call" and route to the earpiece.
        myStream = await navigator.mediaDevices.getUserMedia({ 
            video: true, 
            audio: true 
        });

        // STEP 2: Immediately stop the video track.
        // We don't need video, we just needed the permission/mode.
        // This turns off the camera light and stops video data usage.
        const videoTrack = myStream.getVideoTracks()[0];
        if (videoTrack) {
            videoTrack.stop();
            myStream.removeTrack(videoTrack);
        }

        isMicOn = true;
        updateMicUI();
      } catch (e) { 
        console.error("Media access denied or error.", e); 
        // Fallback: Try audio only if video request was denied
        try {
            myStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
            isMicOn = true;
            updateMicUI();
        } catch (e2) {
            console.error("Audio access also denied.", e2);
            alert("Microphone access is required for voice chat.");
        }
      }
    }
    
    // --- SOCKET EVENTS ---
    socket.on('room-created', (data) => { isHost = true; initRoom(data.roomId); saveSession(data.roomId, myName); });
    socket.on('room-joined', (data) => { 
      isHost = false; 
      initRoom(data.roomId); 
      saveSession(data.roomId, myName);
      if(data.welcomeMsg && data.welcomeMsg.length > 0) {
        document.getElementById('welcome-text-content').innerText = data.welcomeMsg;
        document.getElementById('welcome-overlay').style.display = 'flex';
      }
      if(data.videoSrc && data.videoSrc.length > 0) {
        video.src = data.videoSrc;
        document.getElementById('guestWaiting').classList.add('hidden');
        video.play().catch(e => document.getElementById('mobilePlayOverlay').style.display = 'flex');
      } else {
        document.getElementById('guestWaiting').classList.remove('hidden');
      }
      socket.emit('request-state');
    });

    socket.on('error', (msg) => {
      alert(msg);
      if(msg.includes('not found')) { clearSession(); window.location.reload(); }
    });

    socket.on('chat-message', (data) => addChatMessage(data.name, data.msg, '#00f3ff'));
    socket.on('user-joined', (data) => { 
      addChatMessage('System', `${data.name} joined`, '#888'); 
      createPeerConnection(data.id, true); 
    });
    socket.on('user-disconnected', (data) => {
      addChatMessage('System', `${data.name} left`, '#888');
      if(peers[data.id]) { peers[data.id].close(); delete peers[data.id]; }
      const audioEl = document.getElementById(`audio-${data.id}`);
      if(audioEl) audioEl.remove();
    });

    // --- WEBRTC ---
    socket.on('signal', async (data) => {
      if (!peers[data.from]) createPeerConnection(data.from, false);
      const pc = peers[data.from];
      try {
        if (data.signal.type === 'offer') {
          await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
          const answer = await pc.createAnswer();
          await pc.setLocalDescription(answer);
          socket.emit('signal', { to: data.from, signal: answer });
        } else if (data.signal.type === 'answer') {
          await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
        } else if (data.signal.candidate) {
          await pc.addIceCandidate(new RTCIceCandidate(data.signal));
        }
      } catch (err) { console.error('Signal Error:', err); }
    });

    function createPeerConnection(userId, isOfferer) {
      if (peers[userId]) return;
      
      const pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
      peers[userId] = pc;

      // 1. Setup Listeners FIRST
      pc.onicecandidate = (event) => { 
        if (event.candidate) socket.emit('signal', { to: userId, signal: event.candidate }); 
      };

      pc.ontrack = (event) => {
        console.log("Received remote track");
        let remoteAudio = document.getElementById(`audio-${userId}`);
        if (!remoteAudio) { 
            remoteAudio = document.createElement('audio'); 
            remoteAudio.id = `audio-${userId}`; 
            remoteAudio.autoplay = true; 
            remoteAudio.playsInline = true;
            document.body.appendChild(remoteAudio); 
        }
        if (remoteAudio.srcObject !== event.streams[0]) {
            remoteAudio.srcObject = event.streams[0];
            remoteAudio.play().catch(e => console.error("Audio play error:", e));
        }
      };

      if (isOfferer) {
        pc.onnegotiationneeded = async () => {
          try { 
            const offer = await pc.createOffer(); 
            await pc.setLocalDescription(offer); 
            socket.emit('signal', { to: userId, signal: offer }); 
          } catch (err) { console.error(err); }
        };
      }

      // 2. Add Tracks
      if (myStream) {
        // Ensure we only add audio tracks since video was stopped
        myStream.getAudioTracks().forEach(track => pc.addTrack(track, myStream));
      }
    }

    // --- VIDEO SYNC & SEEK ---
    socket.on('sync-video', (data) => {
      if(!isHost) {
        if(data.type === 'play') { video.currentTime = data.time; video.play(); }
        else if(data.type === 'pause') { video.currentTime = data.time; video.pause(); }
        else if(data.type === 'seek') { video.currentTime = data.time; }
        else if(data.type === 'src') { video.src = data.src; document.getElementById('guestWaiting').classList.add('hidden'); video.play().catch(e => document.getElementById('mobilePlayOverlay').style.display = 'flex'); }
      }
    });
    
    function initRoom(id) {
      document.getElementById('lobbyPage').classList.add('hidden');
      document.getElementById('watchRoom').classList.remove('hidden');
      document.getElementById('displayRoomCodeChat').innerText = id;
      if (!isHost) document.getElementById('sourceControls').classList.add('hidden');
      else document.getElementById('guestWaiting').classList.add('hidden');
      if(window.innerWidth <= 768) { sidebar.classList.remove('open'); sidebar.classList.add('hidden'); }
      else { sidebar.classList.remove('hidden'); verticalBar.classList.remove('sidebar-hidden'); }
    }
    function updateWelcomeMsg(msg) { if(isHost) socket.emit('set-welcome-msg', { msg }); }
    function leaveRoom() { clearSession(); window.location.href = '/'; }
    function forcePlay() { video.play(); document.getElementById('mobilePlayOverlay').style.display = 'none'; }
    function togglePlayPause() { if(video.paused) video.play(); else video.pause(); }
    
    video.addEventListener('timeupdate', () => {
      const percent = (video.currentTime / video.duration) * 100;
      progressBar.style.width = percent + '%';
      const ct = Math.floor(video.currentTime);
      const d = Math.floor(video.duration) || 0;
      document.getElementById('timeDisplay').innerText = `${formatTime(ct)} / ${formatTime(d)}`;
    });

    video.addEventListener('seeked', () => {
      if(isHost) socket.emit('sync-video', { type: 'seek', time: video.currentTime });
    });

    progressContainer.addEventListener('click', (e) => {
      const rect = progressContainer.getBoundingClientRect();
      const pos = (e.clientX - rect.left) / rect.width;
      video.currentTime = pos * video.duration;
    });

    video.onplay = () => { 
      document.getElementById('mobilePlayOverlay').style.display = 'none'; 
      updateIcons(); 
      if(isHost) socket.emit('sync-video', { type: 'play', time: video.currentTime }); 
    };
    video.onpause = () => { 
      updateIcons(); 
      if(isHost) socket.emit('sync-video', { type: 'pause', time: video.currentTime }); 
    };
    
    function updateIcons() { 
      document.getElementById('playIcon').classList.toggle('hidden', !video.paused); 
      document.getElementById('pauseIcon').classList.toggle('hidden', video.paused); 
    }
    
    function formatTime(s) { const m = Math.floor(s / 60); const sec = s % 60; return `${m}:${sec.toString().padStart(2, '0')}`; }
    
    function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(err => console.log(err)); else document.exitFullscreen(); }
    function hideSourceControls() { if (!isHost) return; sourceControls.classList.add('hidden'); }

    async function uploadVideo(input) {
        if (input.files && input.files[0]) {
            const file = input.files[0];
            if (file.size > 1024 * 1024 * 1024) { alert("File is too large! Max size is 1GB."); input.value = ''; return; }
            const formData = new FormData(); 
            formData.append('video', file);
            const label = document.getElementById('uploadLabel'); 
            label.innerText = "Uploading...";
            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'Upload failed');
                if (data.filePath) { 
                    video.src = data.filePath; 
                    video.play(); 
                    label.innerText = file.name; 
                    socket.emit('sync-video', { type: 'src', src: data.filePath }); 
                    hideSourceControls(); 
                } 
            } catch (err) { 
                console.error(err); alert('Error: ' + err.message); label.innerText = "Upload Video"; 
            } finally { input.value = ''; }
        }
    }
    function loadLink() {
        const url = document.getElementById('videoLinkInput').value;
        if(url) { video.src = url; video.play(); document.getElementById('uploadLabel').innerText = "External Source"; socket.emit('sync-video', { type: 'src', src: url }); hideSourceControls(); }
    }
    function requestSync() { if(!isHost) socket.emit('request-sync'); }
    function toggleChat() {
        if (window.innerWidth <= 768) { sidebar.classList.toggle('open'); sidebar.classList.remove('hidden'); }
        else { sidebar.classList.toggle('hidden'); verticalBar.classList.toggle('sidebar-hidden', sidebar.classList.contains('hidden')); }
    }
    function toggleSource() { if (window.innerWidth <= 768 && !sidebar.classList.contains('open')) { sidebar.classList.add('open'); sidebar.classList.remove('hidden'); } else { sourceControls.classList.toggle('hidden'); } }
    function sendMessage() { const input = document.getElementById('chatInput'); const msg = input.value; if(!msg.trim()) return; socket.emit('chat-message', { name: myName, msg }); addChatMessage(myName, msg, 'white'); input.value = ''; }
    function toggleMic() { isMicOn = !isMicOn; if(myStream) myStream.getAudioTracks()[0].enabled = isMicOn; updateMicUI(); }
    function updateMicUI() { document.getElementById('micOn').classList.toggle('hidden', !isMicOn); document.getElementById('micOff').classList.toggle('hidden', isMicOn); document.getElementById('micBtn').classList.toggle('active', isMicOn); }
  </script>
